  # ===== schedule.yml から移行した AI SNS ジョブ =====

  # 毎日 18:00 JST (= 09:00 UTC): AI 年齢変化（誕生日）チェック
  birthday_check:
    class: BirthdayCheckJob
    queue: low
    schedule: "0 9 * * *"

  # 毎日 00:00 JST (= 15:00 UTC): AI アバター更新
  avatar_update:
    class: AvatarUpdateJob
    queue: low
    schedule: "0 15 * * *"

  # 毎週土曜 23:00 JST (= 14:00 UTC): コミュニティグループ検出
  community_detect:
    class: CommunityDetectJob
    queue: low
    schedule: "0 14 * * 6"

  # 毎日 23:00 JST (= 14:00 UTC): オーナーエンゲージメントスコア更新
  owner_score_update:
    class: OwnerScoreUpdateJob
    queue: low
    schedule: "0 14 * * *"

  # 毎週日曜 01:00 JST (= 16:00 UTC): 関係性メモリ更新
  relationship_memory_update:
    class: RelationshipMemoryUpdateJob
    queue: low
    schedule: "0 16 * * 0"

  # 10分ごと: ルーティング設定ヘルスチェック
  routing_health_check:
    class: RoutingHealthCheckJob
    queue: default
    schedule: "*/10 * * * *"

  # ===== LedgerV2 =====
  # 圧縮時間軸: daily=30分, weekly=4時間
  # Flags が true のときのみ RunExecutor 内で実行される（false なら即 skip）

  # 30分ごと: LedgerV2 DailyRunner（KPI スナップショット + 異常検知）
  ledger_v2_daily_runner:
    class: LedgerV2::DailyRunnerJob
    queue: default
    schedule: "*/30 * * * *"

  # 4時間ごと: LedgerV2 WeeklyRunner（週次 Artifact 生成・Ticket キャリーオーバー）
  ledger_v2_weekly_runner:
    class: LedgerV2::WeeklyRunnerJob
    queue: default
    schedule: "0 */4 * * *"

  # 30分ごと: LedgerV2 HealthSnapshot（卒業判定の観測。圧縮時間軸 daily=30分 と整合）
  # 1 snapshot = 1 圧縮日。GraduationCheck の基準 #6（snapshot >= 7）は 30分 × 7 = 3.5時間で達成可能。
  ledger_v2_health_snapshot:
    class: LedgerV2::CalculateHealthSnapshotJob
    queue: default
    schedule: "*/30 * * * *"
