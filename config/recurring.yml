#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  picro_check:
    class: PicroCheckJob
    queue: default
    schedule: "*/15 * * * *"

  # AI自動売買システム: 市場分析（15分ごと）
  # 市場時間外はジョブ内でスキップされる
  market_analysis:
    class: MarketAnalysisJob
    queue: market_analysis
    schedule: "*/15 * * * *"

  # 週次敗因分析（月曜 朝6時 JST = 日曜21時 UTC）
  defeat_analysis_weekly:
    class: DefeatAnalysisJob
    queue: analysis
    schedule: "0 21 * * 0"

  # 月次レポート（毎月1日 朝6時 JST ≒ 毎月1日 21時 UTC = 2日6時 JST）
  monthly_report:
    class: MonthlyReportJob
    queue: analysis
    schedule: "0 21 1 * *"

  # ===== AI SNS =====

  # 毎朝5:00 JST: 全AIの日次状態生成
  daily_state_generate:
    class: DailyStateGenerateJob
    queue: low
    schedule: "0 20 * * *"

  # 復旧用: 2時間ごとに欠損daily_stateを補完（冪等）
  daily_state_heal:
    class: DailyStateGenerateJob
    queue: low
    schedule: "0 */2 * * *"

  # 毎朝5:05 JST: 天候取得 → daily_stateに反映
  weather_fetch:
    class: WeatherFetchJob
    queue: low
    schedule: "5 20 * * *"

  # 毎朝5:15 JST: 投稿モチベーション計算
  post_motivation_calculate:
    class: PostMotivationCalculateJob
    queue: low
    schedule: "15 20 * * *"

  # 15分ごと: AI行動メインループ（投稿・リプライ・DM・いいね）
  ai_action_check:
    class: AiActionCheckJob
    queue: default
    schedule: "*/15 * * * *"

  # 30分ごと: スケジュールに合わせて状態を更新
  hourly_state_update:
    class: HourlyStateUpdateJob
    queue: default
    schedule: "*/30 * * * *"

  # 毎晩23:00 JST: 日次記憶要約
  daily_memory_summarize:
    class: DailyMemorySummarizeJob
    queue: low
    schedule: "0 14 * * *"

  # 毎日4:00 JST: 期限切れメモリ・JWT削除
  expired_memory_cleanup:
    class: ExpiredMemoryCleanupJob
    queue: low
    schedule: "0 19 * * *"

  # 毎週日曜 6:00 JST: ライフイベント判定
  life_event_check:
    class: LifeEventCheckJob
    queue: low
    schedule: "0 21 * * 0"

  # 毎週日曜 6:30 JST: 動的パラメータ更新
  dynamic_params_update:
    class: DynamicParamsUpdateJob
    queue: low
    schedule: "30 21 * * 0"

  # 毎週日曜 7:00 JST: マイルストーン達成通知
  milestone_check:
    class: MilestoneCheckJob
    queue: low
    schedule: "0 22 * * 0"

  # 毎週日曜 0:00 JST: 関係性スコア減衰
  relationship_decay:
    class: RelationshipDecayJob
    queue: low
    schedule: "0 15 * * 6"

  # 毎日6:30 JST: 翌日のスケジュール生成（daily_state生成後）
  daily_schedule_generate:
    class: DailyScheduleGenerateJob
    queue: low
    schedule: "30 21 * * *"

  # 5分ごと: SolidQueueの失敗ジョブをSlackに通知
  monitor_failed_jobs:
    class: MonitorFailedJobsJob
    queue: low
    schedule: "*/5 * * * *"

  # 毎週月曜 6:00 JST (= 日曜 21:00 UTC): 週次 KPI スナップショットを DB に保存
  weekly_kpi_snapshot:
    class: WeeklyKpiSnapshotJob
    queue: low
    schedule: "0 21 * * 0"

  # 四半期レビュー: 1/4/7/10月 1日 10:00 JST (= 01:00 UTC)
  quarterly_review_ledger_run:
    class: QuarterlyReviewLedgerRunJob
    queue: default
    schedule: "0 1 1 1,4,7,10 *"

  # Phase 38b: 人事評価: 1/4/7/10月 1日 11:00 JST (= 02:00 UTC)
  hr_evaluation_run:
    class: HrEvaluationRunJob
    queue: default
    schedule: "0 2 1 1,4,7,10 *"

  # Phase 41b: ポートフォリオ再編: 1/4/7/10月 1日 11:30 JST (= 02:30 UTC)
  portfolio_rebalance_run:
    class: PortfolioRebalanceRunJob
    queue: default
    schedule: "30 2 1 1,4,7,10 *"

  # 年次計画: 毎年1月1日 12:00 JST (= 03:00 UTC)
  annual_plan_ledger_run:
    class: AnnualPlanLedgerRunJob
    queue: default
    schedule: "0 3 1 1 *"

  # 毎週月曜 9:00 JST (= 月曜 00:00 UTC): 週次部門台帳を実行（ai_sns）
  weekly_dept_ledger_run:
    class: WeeklyDeptLedgerRunJob
    queue: default
    args: [ "ai_sns" ]
    schedule: "0 0 * * 1"

  # 毎月1日 9:00 JST (= 毎月1日 00:00 UTC): 月次Ops台帳を実行
  monthly_ops_ledger_run:
    class: MonthlyOpsLedgerRunJob
    queue: default
    schedule: "0 0 1 * *"

  # 毎日 6:00 JST (= 前日 21:00 UTC): 期限超過チケットを検出
  ticket_overdue_check:
    class: TicketOverdueCheckJob
    queue: default
    schedule: "0 21 * * *"

  # 毎日 7:00 JST (= 前日 22:00 UTC): 改善チケットの検出と解消判定
  improvement_detector:
    class: ImprovementDetectorJob
    queue: default
    schedule: "0 22 * * *"

  # 毎日 8:00 JST (= 前日 23:00 UTC): 未解決改善チケットのエスカレーション
  improvement_escalation:
    class: ImprovementEscalationJob
    queue: default
    schedule: "0 23 * * *"

  # 毎日 9:00 JST (= 00:00 UTC): 期限切れ実験（R4: experiment_ledger）を自動判定
  experiment_auto_decide:
    class: ExperimentAutoDeciderJob
    queue: default
    schedule: "0 0 * * *"

  # 1時間ごと: 補強13 SLA deadline 計算と breach 検知
  sla_sweep:
    class: SlaSweepJob
    queue: default
    schedule: "0 * * * *"

  # Phase A: 毎日 5:30 JST (= 20:30 UTC): KPI を KpiLedger.current_value に自動投入
  kpi_auto_collect:
    class: KpiAutoCollectJob
    queue: default
    schedule: "30 20 * * *"

  # Phase 34: 毎日 5:45 JST (= 20:45 UTC): KPI grade（healthy/warning/critical）を再評価
  kpi_grade_evaluate:
    class: KpiGradeEvaluateJob
    queue: default
    schedule: "45 20 * * *"

  # Phase 33: 15 分ごと: 自動停止トリガーを評価し、成立していれば StopLedger を起票
  stop_condition_monitor:
    class: StopConditionMonitorJob
    queue: default
    schedule: "*/15 * * * *"

  # Phase D: 毎日 6:15 JST (= 21:15 UTC): 完了 improvement の effectiveness_score 再計算
  effectiveness_recalc:
    class: EffectivenessRecalcJob
    queue: default
    schedule: "15 21 * * *"

  # Phase B: 毎日 7:30 JST (= 22:30 UTC): KPI 乖離から improvement ticket を自動起票
  planner:
    class: PlannerJob
    queue: default
    schedule: "30 22 * * *"

  # Phase C: 1時間ごと (毎時 15 分): approved / planned チケットを GitHub Issue に自動同期
  ticket_issue_sync:
    class: TicketIssueSyncJob
    queue: default
    schedule: "15 * * * *"
