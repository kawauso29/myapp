upstream myapp { server unix:///home/ubuntu/myapp/tmp/sockets/puma.sock; }

server {
    listen 80;
    server_name 133.167.124.112;
    root /home/ubuntu/myapp/public;

    # WebSocket (ActionCable)
    location /cable {
        proxy_pass http://myapp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API and admin go directly to Rails
    location ~ ^/(api|admin)/ {
        proxy_pass http://myapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA (/app/*) - Expo web build
    location /app/ {
        alias /home/ubuntu/myapp/public/app/;
        try_files $uri $uri/ /app/index.html;
    }

    # Redirect root to /app/
    location = / {
        return 302 /app/;
    }

    # Static assets served directly
    location / {
        try_files $uri @myapp;
    }

    location @myapp {
        proxy_pass http://myapp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
