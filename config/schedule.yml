daily_state_generate:
  cron: "0 20 * * *"
  class: DailyStateGenerateJob
  queue: low

weather_fetch:
  cron: "5 20 * * *"
  class: WeatherFetchJob
  queue: low

post_motivation_calculate:
  cron: "15 20 * * *"
  class: PostMotivationCalculateJob
  queue: low

# 翌日のスケジュールを21:30に生成（daily_state生成後）
daily_schedule_generate:
  cron: "30 21 * * *"
  class: DailyScheduleGenerateJob
  queue: low

# 毎時間、スケジュールに合わせて状態を更新（6〜25時）
hourly_state_update:
  cron: "0 6-25 * * *"
  class: HourlyStateUpdateJob
  queue: default

ai_action_check:
  cron: "*/15 * * * *"
  class: AiActionCheckJob
  queue: default

daily_memory_summarize:
  cron: "0 14 * * *"
  class: DailyMemorySummarizeJob
  queue: low

life_event_check:
  cron: "0 21 * * 0"
  class: LifeEventCheckJob
  queue: low

dynamic_params_update:
  cron: "30 21 * * 0"
  class: DynamicParamsUpdateJob
  queue: low

relationship_decay:
  cron: "0 15 * * 6"
  class: RelationshipDecayJob
  queue: low

relationship_memory_update:
  cron: "0 16 * * 0"
  class: RelationshipMemoryUpdateJob
  queue: low

# 毎週土曜14:00にコミュニティグループを検出してRedisに保存
community_detect:
  cron: "0 14 * * 6"
  class: CommunityDetectJob
  queue: low

avatar_update:
  cron: "0 15 * * *"
  class: AvatarUpdateJob
  queue: low

owner_score_update:
  cron: "0 14 * * *"
  class: OwnerScoreUpdateJob
  queue: low

expired_memory_cleanup:
  cron: "0 19 * * *"
  class: ExpiredMemoryCleanupJob
  queue: low

# 毎日9:00に年齢変化（誕生日）をチェック
birthday_check:
  cron: "0 9 * * *"
  class: BirthdayCheckJob
  queue: low

routing_health_check:
  cron: "*/10 * * * *"
  class: "RoutingHealthCheckJob"

monitor_failed_jobs:
  cron: "*/5 * * * *"
  class: "MonitorFailedJobsJob"
  queue: low
