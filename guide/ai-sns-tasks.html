<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SNS — 設計課題リスト</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono&display=swap');

  :root {
    --bg: #0f0f12;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --text: #e2ddd6;
    --muted: #6b6b72;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;

    --c-done: #4a9c6e;
    --c-doing: #c8a040;
    --c-todo: #7e9bc8;
    --c-block: #c86060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    padding: 40px 20px 100px;
    font-size: 13px;
    line-height: 1.7;
  }

  .container { max-width: 900px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .header .subtitle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 32px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--c-done), var(--c-doing));
    transition: width 0.3s;
  }

  /* Category */
  .category {
    margin-bottom: 32px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
  }

  .category-header:hover .category-title { color: var(--text); }

  .category-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    min-width: 24px;
  }

  .category-title {
    font-size: 13px;
    font-weight: 500;
    color: rgba(226,221,214,0.8);
    transition: color 0.15s;
  }

  .category-stats {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }

  .chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .category.collapsed .chevron { transform: rotate(-90deg); }
  .category.collapsed .task-list { display: none; }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-left: 36px;
  }

  .task {
    display: grid;
    grid-template-columns: 16px 1fr auto;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .task:hover { background: var(--surface2); }

  .task.selected {
    background: var(--surface2);
    outline: 1px solid rgba(255,255,255,0.1);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .status-done    { background: var(--c-done); }
  .status-doing   { background: var(--c-doing); }
  .status-todo    { background: var(--c-todo); }
  .status-block   { background: var(--c-block); }

  .task-content {}

  .task-title {
    font-size: 13px;
    font-weight: 400;
    margin-bottom: 2px;
    color: var(--text);
  }

  .task-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .task-tag {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 100px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }

  .tag-design   { background: rgba(126,155,200,0.15); color: var(--c-todo); }
  .tag-logic    { background: rgba(200,160,64,0.15);  color: var(--c-doing); }
  .tag-ux       { background: rgba(74,156,110,0.15);  color: var(--c-done); }
  .tag-cost     { background: rgba(200,96,96,0.15);   color: var(--c-block); }
  .tag-prompt   { background: rgba(180,126,200,0.15); color: #b47ec8; }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 340px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 100;
  }

  .detail-panel.open { transform: translateX(0); }

  .detail-close {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-close:hover { color: var(--text); }

  .detail-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    margin-bottom: 16px;
  }

  .detail-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .detail-desc {
    font-size: 12px;
    color: rgba(226,221,214,0.7);
    line-height: 1.8;
    margin-bottom: 20px;
  }

  .detail-section {
    margin-bottom: 20px;
  }

  .detail-section h4 {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .detail-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-list li {
    font-size: 12px;
    color: rgba(226,221,214,0.75);
    list-style: none;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .detail-list li::before {
    content: '—';
    color: var(--muted);
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 10px;
  }

  .detail-action {
    display: inline-block;
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 10px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
    text-align: center;
    width: 100%;
  }

  .detail-action:hover { background: rgba(255,255,255,0.1); }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }

  .overlay.open { display: block; }

  @media (max-width: 600px) {
    .task-list { padding-left: 12px; }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>AI SNS — 設計課題リスト</h1>
      <div class="subtitle">クリックで詳細を確認 / 各タスクを順番に詰めていく</div>

      <div class="legend-item"><div class="dot" style="background:var(--c-block)"></div>要検討</div>
    </div>
  </div>

    <div class="progress-label">

    </div>

  </div>

  <div id="categories"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-close" onclick="closeDetail()">← 閉じる</div>
  <div id="detail-content"></div>
</div>

function statusLabel(s) {
  const m = { done: '概念確定', doing: '詰め中', todo: '未着手', block: '要検討' };
  return m[s] || s;
}

function statusColor(s) {
  const m = { done: 'var(--c-done)', doing: 'var(--c-doing)', todo: 'var(--c-todo)', block: 'var(--c-block)' };
  return m[s] || '#888';
}

function tagClass(t) {
  const m = { design: 'tag-design', logic: 'tag-logic', ux: 'tag-ux', cost: 'tag-cost', prompt: 'tag-prompt' };
  return m[t] || 'tag-design';
}

let selectedTask = null;

function renderAll() {
  const container = document.getElementById('categories');
  let totalDone = 0, totalAll = 0;

  data.forEach(cat => {
    const doneCount = cat.tasks.filter(t => t.status === 'done').length;
    const doingCount = cat.tasks.filter(t => t.status === 'doing').length;
    totalDone += doneCount + doingCount * 0.5;
    totalAll += cat.tasks.length;

    const div = document.createElement('div');
    div.className = 'category';
    div.innerHTML = `
      <div class="category-header" onclick="toggleCategory(this)">
        <span class="category-num">${cat.id}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-stats">${doneCount + doingCount} / ${cat.tasks.length}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="task-list">
        ${cat.tasks.map(task => `
          <div class="task" id="task-${task.id}" onclick="showDetail('${task.id}')">
            <div class="status-dot status-${task.status}"></div>
            <div class="task-content">
              <div class="task-title">${task.title}</div>
              <div class="task-desc">${task.desc}</div>
            </div>
            <span class="task-tag ${tagClass(task.tag)}">${task.tagLabel}</span>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
  });

  const pct = Math.round((totalDone / totalAll) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${Math.round(totalDone)} / ${totalAll}`;
}

function toggleCategory(header) {
  header.parentElement.classList.toggle('collapsed');
}

function showDetail(taskId) {
  const task = data.flatMap(c => c.tasks).find(t => t.id === taskId);
  if (!task) return;

  if (selectedTask) document.getElementById('task-' + selectedTask)?.classList.remove('selected');
  selectedTask = taskId;
  document.getElementById('task-' + taskId)?.classList.add('selected');

  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="detail-status">
      <div class="dot" style="background:${statusColor(task.status)}"></div>
      <span style="color:${statusColor(task.status)};font-family:var(--mono);font-size:10px">${statusLabel(task.status)}</span>
      <span style="color:var(--muted);margin-left:8px">${task.id}</span>
    </div>
    <div class="detail-title">${task.title}</div>
    <div class="detail-desc">${task.desc}</div>

    <div class="detail-section">
      <h4>詰めるべき問い</h4>
      <ul class="detail-list">
        ${task.questions.map(q => `<li>${q}</li>`).join('')}
      </ul>
    </div>

    <div class="detail-section">
      <h4>現時点の方針</h4>
      <ul class="detail-list">
        ${task.points.map(p => `<li>${p}</li>`).join('')}
      </ul>
    </div>

    <div class="detail-action" onclick="startDiscussion('${task.id}')">
      このタスクを詰める →
    </div>
  `;

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  if (selectedTask) {
    document.getElementById('task-' + selectedTask)?.classList.remove('selected');
    selectedTask = null;
  }
}

function startDiscussion(taskId) {
  const task = data.flatMap(c => c.tasks).find(t => t.id === taskId);
  if (!task) return;
  closeDetail();
  sendPrompt(`「${task.title}」を詳しく詰めていきたい。現状の課題は「${task.questions[0]}」あたりから始めよう`);
}

renderAll();
</script>
