notes: |
  2026-W22（5月25日〜31日）は梅雨入り直前・初夏の入口にあたる週。
  GW明けの疲れと梅雨前の憂鬱が混在する時期で、
  「だるさをユーモアに変える」「気まずさを柔らかくする」ニーズが高い。
  6月の父の日（6/21）に向けた感謝系スタンプも先行需要が期待できる。
  ターゲットは20〜30代を中心に、家族用途では40代以上も視野に。
