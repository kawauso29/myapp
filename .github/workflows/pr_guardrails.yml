name: PR Guardrails

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-description:
    name: Validate required PR metadata
    runs-on: [self-hosted, sakura-vps]
    steps:
      - name: Check required sections
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          REQUIRED_SECTIONS = {
            "背景 / 目的": ["背景/目的", "purpose/background", "background/purpose"],
            "変更内容": ["what changed", "changes"],
            "受け入れ条件（Acceptance Criteria）": ["受入条件（acceptance criteria）", "acceptance criteria", "acceptance"],
            "テスト（実行方法 / 結果）": ["テスト", "tests", "test plan", "test results"],
            "ロールアウト / デプロイノート": ["ロールアウト/デプロイ注意", "rollout/deploy notes", "deploy notes", "rollout"],
            "Ledger影響（台帳・テーブル・運用領域）": ["Ledger影響（台帳/Runner/定期実行）", "ledger impact", "ledger", "impact area"],
            "リスクとロールバック": ["リスク&ロールバック", "risk & rollback", "risk and rollback"],
          }

          # §31 必須メタ情報キー（設計書 §30.4 / §31）
          REQUIRED_META_KEYS = [
            "service_id",
            "linked_kpis",
            "source_ticket_id",
            "risk_level",
            "docs_update_required",
            "tech_record_update_required",
          ]

          VALID_RISK_LEVELS = {"high", "medium", "low"}
          VALID_BOOL_VALUES = {"true", "false"}
          PLACEHOLDER_PATTERNS = (
            re.compile(r"^\s*$"),
            re.compile(r"^<!--.*-->$"),
            re.compile(r"^[-–—]+$"),
            re.compile(r"^\s*例[:：]"),
            re.compile(r"^\s*TODO\s*$", re.IGNORECASE),
          )

          # 自動運用ブランチは本文テンプレ検証/§31メタ検証をスキップする（運用ルールに合わせる）。
          AUTO_BRANCH_PREFIXES = (
            "copilot/",
            "auto-fix/",
            "deploy-failure/",
            "dependabot/",
          )

          def normalize_heading(value):
            value = value.strip().lower()
            value = value.translate(str.maketrans({
              "　": " ",
              "／": "/",
              "（": "(",
              "）": ")",
              "＆": "&",
              "・": "",
              "：": ":",
            }))
            value = re.sub(r"\s+", "", value)
            return value

          def extract_sections(markdown):
            sections = {}
            current_heading = None
            current_lines = []

            for line in markdown.splitlines():
              heading_match = re.match(r"^\s*##\s+(.+?)\s*$", line)
              if heading_match:
                if current_heading is not None:
                  sections[current_heading] = "\n".join(current_lines).strip()
                current_heading = heading_match.group(1).strip()
                current_lines = []
              elif current_heading is not None:
                current_lines.append(line)

            if current_heading is not None:
              sections[current_heading] = "\n".join(current_lines).strip()

            return sections

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as f:
            event = json.load(f)

          pr = event.get("pull_request", {})
          body = pr.get("body") or ""
          pr_url = pr.get("html_url", "")
          head_ref = (pr.get("head") or {}).get("ref") or ""
          skip_template_validation = head_ref.startswith(AUTO_BRANCH_PREFIXES)
          skip_meta = head_ref.startswith(AUTO_BRANCH_PREFIXES)

          if not body.strip():
            print("::error title=PR Guardrails::PR本文が空です。PRテンプレートの必須セクションをすべて記入してください。")
            with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              print("### ❌ PR Guardrails 失敗", file=summary)
              print("- PR本文が空です。テンプレートの必須セクションを記入してください。", file=summary)
              if pr_url:
                print(f"- PR: {pr_url}", file=summary)
            sys.exit(1)

          sections = extract_sections(body)
          normalized_sections = {normalize_heading(key): value for key, value in sections.items()}
          normalized_required = {
            display_name: [normalize_heading(display_name), *[normalize_heading(alias) for alias in aliases]]
            for display_name, aliases in REQUIRED_SECTIONS.items()
          }

          missing_sections = []
          empty_sections = []

          if not skip_template_validation:
            for display_name, candidate_keys in normalized_required.items():
              matched_key = next((key for key in candidate_keys if key in normalized_sections), None)

              if matched_key is None:
                missing_sections.append(display_name)
                continue

              if not normalized_sections[matched_key].strip():
                empty_sections.append(display_name)

          if missing_sections or empty_sections:
            print("::error title=PR Guardrails::PR本文の必須セクションが不足または未記入です。")
            if missing_sections:
              print("::error title=Missing sections::" + " / ".join(missing_sections))
            if empty_sections:
              print("::error title=Empty sections::" + " / ".join(empty_sections))

            with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              print("### ❌ PR Guardrails 失敗", file=summary)
              if missing_sections:
                print("- 不足セクション:", file=summary)
                for section in missing_sections:
                  print(f"  - `{section}`", file=summary)
              if empty_sections:
                print("- 未記入セクション:", file=summary)
                for section in empty_sections:
                  print(f"  - `{section}`", file=summary)
              print("", file=summary)
              print("PRテンプレートに沿って本文を更新してください。", file=summary)

            sys.exit(1)

          # §31 必須メタ情報の検証（自動運用ブランチは skip）
          meta_errors = []
          if not skip_meta:
            # PR本文から "key: value" 形式で必須メタ情報を抽出する
            meta_values = {}
            for line in body.splitlines():
              m = re.match(r"^\s*[-*]\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*[:：]\s*(.*)$", line)
              if m:
                key = m.group(1).strip().lower()
                value = m.group(2).strip()
                # HTMLコメントは値から除去
                value = re.sub(r"<!--.*?-->", "", value).strip()
                if key in REQUIRED_META_KEYS and value:
                  meta_values[key] = value

            for key in REQUIRED_META_KEYS:
              value = meta_values.get(key)
              if not value or any(p.match(value) for p in PLACEHOLDER_PATTERNS):
                meta_errors.append(f"{key}: 未記入")
                continue
              if key == "risk_level" and value.lower() not in VALID_RISK_LEVELS:
                meta_errors.append(f"{key}: 値 '{value}' は high/medium/low のいずれかである必要があります")
              elif key in ("docs_update_required", "tech_record_update_required") and value.lower() not in VALID_BOOL_VALUES:
                meta_errors.append(f"{key}: 値 '{value}' は true/false である必要があります")

          if meta_errors:
            print("::error title=PR Guardrails::§31 必須メタ情報が不足または不正です。")
            for msg in meta_errors:
              print(f"::error title=Meta field::{msg}")
            with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              print("### ❌ §31 必須メタ情報 検証失敗", file=summary)
              for msg in meta_errors:
                print(f"- {msg}", file=summary)
              print("", file=summary)
              print("設計書 §30.4 / §31 に基づき、以下のキーを `key: value` 形式でPR本文に記入してください:", file=summary)
              print("`service_id` / `linked_kpis` / `source_ticket_id` / `risk_level` / `docs_update_required` / `tech_record_update_required`", file=summary)
            sys.exit(1)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
            print("### ✅ PR Guardrails 成功", file=summary)
            if skip_template_validation:
              print(f"- 本文テンプレ検証: skip（自動運用ブランチ: `{head_ref}`）", file=summary)
            else:
              print("- 必須セクションがすべて確認できました。", file=summary)
            if skip_meta:
              print(f"- §31 メタ情報検証: skip（自動運用ブランチ: `{head_ref}`）", file=summary)
            else:
              print("- §31 必須メタ情報: OK", file=summary)
          PY
