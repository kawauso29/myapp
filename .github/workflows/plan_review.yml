name: 計画自動レビュー・生成

# todo 項目が枯渇（残り2件以下）したとき、KPIデータと完了施策の結果を分析して
# 次期改善計画を Copilot に提案させる。
# PDCA の Act フェーズ（計画見直し・追加）を自動化する。

on:
  workflow_dispatch:
    inputs:
      force:
        description: "todo残数に関係なく強制的に計画レビューを実行する"
        required: false
        default: "false"
  # weekly_pdca.yml からの dispatch で起動
  # schedule は weekly_pdca.yml 側で制御

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  plan_review:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4

      - name: 計画状況を分析
        id: analyze
        run: |
          TODO_COUNT=$(grep -c "status: todo" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          TODO_COUNT=${TODO_COUNT:-0}
          IN_PROGRESS=$(grep -c "status: in_progress" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          IN_PROGRESS=${IN_PROGRESS:-0}
          DONE_COUNT=$(grep -c "status: done" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          DONE_COUNT=${DONE_COUNT:-0}
          TOTAL=$((TODO_COUNT + IN_PROGRESS + DONE_COUNT))

          echo "todo_count=${TODO_COUNT}" >> "$GITHUB_OUTPUT"
          echo "in_progress=${IN_PROGRESS}" >> "$GITHUB_OUTPUT"
          echo "done_count=${DONE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"

          FORCE="${{ github.event.inputs.force }}"
          # todo が 2 件以下なら計画レビューが必要
          if [ "${TODO_COUNT}" -le 2 ] || [ "${FORCE}" = "true" ]; then
            echo "needs_review=true" >> "$GITHUB_OUTPUT"
            echo "📋 計画レビュー実行: todo=${TODO_COUNT}, in_progress=${IN_PROGRESS}, done=${DONE_COUNT}"
          else
            echo "needs_review=false" >> "$GITHUB_OUTPUT"
            echo "📋 計画レビュー不要: todo=${TODO_COUNT} 件残存"
          fi

      - name: KPI を収集
        if: steps.analyze.outputs.needs_review == 'true'
        id: kpi
        run: |
          set +e
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          KPI_JSON=$(cd ~/myapp && RAILS_ENV=production bin/rails kpi:collect 2>/dev/null)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ] || [ -z "$KPI_JSON" ]; then
            KPI_JSON='{"error":"collect failed","collected_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          fi
          echo "kpi_json<<KPIDELIM" >> "$GITHUB_OUTPUT"
          echo "$KPI_JSON" >> "$GITHUB_OUTPUT"
          echo "KPIDELIM" >> "$GITHUB_OUTPUT"

      - name: 完了施策サマリーを生成
        if: steps.analyze.outputs.needs_review == 'true'
        id: done_summary
        run: |
          # 完了施策のID・タイトル・KPI仮説を抽出
          SUMMARY=$(python3 -c "
          import yaml, json

          with open('docs/ai_sns_plan_status.yml') as f:
              data = yaml.safe_load(f)

          done_items = []
          todo_items = []
          for item_id, item in data.get('items', {}).items():
              if item.get('status') == 'done':
                  done_items.append({
                      'id': item_id,
                      'title': item.get('title', ''),
                      'category': item.get('category', ''),
                      'kpi_hypothesis': item.get('kpi_hypothesis', ''),
                      'kpi_result': item.get('kpi_result', '')
                  })
              elif item.get('status') == 'todo':
                  todo_items.append({
                      'id': item_id,
                      'title': item.get('title', ''),
                      'category': item.get('category', '')
                  })

          print(json.dumps({'done': done_items, 'todo': todo_items}, ensure_ascii=False))
          ")
          echo "summary<<SUMMARYDELIM" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "SUMMARYDELIM" >> "$GITHUB_OUTPUT"

      - name: 計画レビュー Issue を作成
        if: steps.analyze.outputs.needs_review == 'true'
        uses: actions/github-script@v9
        id: create_issue
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const todoCount = '${{ steps.analyze.outputs.todo_count }}';
            const doneCount = '${{ steps.analyze.outputs.done_count }}';
            const total = '${{ steps.analyze.outputs.total }}';
            const kpiJson = `${{ steps.kpi.outputs.kpi_json }}`;
            const doneSummary = `${{ steps.done_summary.outputs.summary }}`;

            // 既存の未完了レビューIssueがあればスキップ
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'plan-review',
              state: 'open',
              per_page: 5
            });
            if (existingIssues.length > 0) {
              core.info(`既存の計画レビュー Issue #${existingIssues[0].number} が未完了です。スキップします。`);
              core.setOutput('skipped', 'true');
              return;
            }

            let kpiFormatted;
            try {
              const kpi = JSON.parse(kpiJson);
              kpiFormatted = JSON.stringify(kpi, null, 2);
            } catch {
              kpiFormatted = kpiJson;
            }

            let doneFormatted;
            try {
              const parsed = JSON.parse(doneSummary);
              const doneList = (parsed.done || []).map(i =>
                `- **[${i.id}] ${i.title}** (${i.category})\n  仮説: ${i.kpi_hypothesis || '未設定'}\n  結果: ${i.kpi_result || '未計測'}`
              ).join('\n');
              const todoList = (parsed.todo || []).map(i =>
                `- **[${i.id}] ${i.title}** (${i.category})`
              ).join('\n');
              doneFormatted = `### 完了済み施策 (${parsed.done?.length || 0}件)\n${doneList}\n\n### 残存 todo (${parsed.todo?.length || 0}件)\n${todoList}`;
            } catch {
              doneFormatted = doneSummary;
            }

            const body = [
              '## 🔄 AI SNS 改良計画 レビュー & 次期計画の提案依頼',
              '',
              `現在の計画が **${doneCount}/${total}** 完了し、残りの todo が **${todoCount}件** です。`,
              '次期の改善施策を提案してください。',
              '',
              '### 現在の KPI',
              '```json',
              kpiFormatted,
              '```',
              '',
              doneFormatted,
              '',
              '---',
              '',
              '### 依頼内容',
              '',
              '以下の手順で次期改善計画を作成してください:',
              '',
              '1. **現在のKPI** と **完了施策の効果** を分析する',
              '2. サービスの弱点・伸びしろを特定する',
              '3. 以下のカテゴリごとに **3〜5個の新施策** を提案する:',
              '   - UX強化',
              '   - AI行動リアリティ',
              '   - ゲーミフィケーション',
              '   - データ可視化',
              '   - マネタイズ',
              '   - 技術的改善',
              '4. 各施策に `priority` (high/medium/low)、`kpi_hypothesis`、`notes` を設定する',
              '5. `docs/ai_sns_plan_status.yml` に新しい項目を追記する（既存のIDと重複しない新IDを使う）',
              '6. `docs/ai_sns_improvement_plan.md` にも対応する詳細説明を追記する',
              '',
              '**注意**: 既存の todo/in_progress 項目は変更しないでください。新規追加のみ行ってください。',
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[計画レビュー] 次期 AI SNS 改善計画の提案 (${new Date().toISOString().split('T')[0]})`,
              body,
              labels: ['plan-review']
            });

            core.info(`計画レビュー Issue #${issue.number} を作成しました: ${issue.html_url}`);
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('skipped', 'false');

      # Issue 本文の @copilot メンションでは Copilot coding agent が起動しないため、
      # 別コメントとして @copilot メンションを投稿する（PRコメントと同じパターン）
      - name: Copilot に計画策定を依頼（Issueコメント）
        if: steps.analyze.outputs.needs_review == 'true' && steps.create_issue.outputs.skipped != 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.create_issue.outputs.issue_number }}', 10);

            const comment = [
              '@copilot このIssueの依頼内容に従って、次期 AI SNS 改善計画を作成してください。',
              '',
              '`docs/ai_sns_plan_status.yml` と `docs/ai_sns_improvement_plan.md` を更新し、',
              '新しい改善施策を追加するPRを作成してください。',
              '',
              '<!-- copilot:model claude-opus-4.6 -->'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            core.info(`Copilot 計画策定依頼コメントを Issue #${issueNumber} に投稿しました`);

      - name: Slack 通知（計画レビュー起票）
        if: steps.analyze.outputs.needs_review == 'true' && steps.create_issue.outputs.skipped != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          TODO_COUNT: ${{ steps.analyze.outputs.todo_count }}
          DONE_COUNT: ${{ steps.analyze.outputs.done_count }}
          TOTAL_COUNT: ${{ steps.analyze.outputs.total }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
          ISSUE_NUM: ${{ steps.create_issue.outputs.issue_number }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            exit 0
          fi
          PAYLOAD=$(python3 -c "
import json, os
todo = os.environ.get('TODO_COUNT', '?')
done = os.environ.get('DONE_COUNT', '?')
total = os.environ.get('TOTAL_COUNT', '?')
issue_url = os.environ.get('ISSUE_URL', '')
issue_num = os.environ.get('ISSUE_NUM', '')
text = '🔄 *計画レビュー 自動起票*\n完了: ' + done + '/' + total + ' | 残todo: ' + todo + '件\nCopilot に次期計画の提案を依頼しました\nIssue #' + issue_num + ': ' + issue_url
print(json.dumps({'text': text}))
")
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: レビュー不要通知
        if: steps.analyze.outputs.needs_review == 'false'
        run: |
          echo "📋 計画レビューは不要です（todo残数: ${{ steps.analyze.outputs.todo_count }}件）"
