name: Auto Fix CI Lint Failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  auto_fix_lint:
    # lint ジョブを含む CI が失敗した場合のみ実行
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
      LINT_JOB_NAME: lint

    steps:
      - name: Check whether lint job failed
        id: lint_check
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            const runId = context.payload.workflow_run.id
            const response = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            })

            const lintJobName = process.env.LINT_JOB_NAME || "lint"
            const lintJob = response.data.jobs.find((job) => job.name === lintJobName)
            if (!lintJob) {
              core.warning(`${lintJobName} job not found in workflow run ${runId}`)
              core.setOutput("lint_failed", "false")
              return
            }

            const lintFailed = lintJob.conclusion === "failure"
            core.info(`${lintJobName} job conclusion: ${lintJob.conclusion}`)
            core.setOutput("lint_failed", lintFailed ? "true" : "false")

      - name: Checkout failing commit
        if: steps.lint_check.outputs.lint_failed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        if: steps.lint_check.outputs.lint_failed == 'true'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop autocorrect
        if: steps.lint_check.outputs.lint_failed == 'true'
        id: rubocop
        run: |
          bin/rubocop --autocorrect || true
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No auto-fixable RuboCop violations found"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "RuboCop auto-corrections found:"
            git diff --stat
          fi

      - name: Create auto-fix PR
        if: steps.lint_check.outputs.lint_failed == 'true' && steps.rubocop.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_MSG: ${{ github.event.workflow_run.head_commit.message }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          BRANCH="auto-fix/rubocop-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "auto-fix: RuboCop autocorrect

          Automatically fixed RuboCop violations after CI lint failure.
          Triggered by commit: ${HEAD_SHA}"
          git push origin "$BRANCH"
          # PR本文をファイルに書き出して特殊文字を安全に扱う
          PR_BODY=$(jq -n \
            --arg sha "${HEAD_SHA}" \
            --arg msg "${HEAD_MSG}" \
            --arg log_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${CI_RUN_ID}" \
            '"## 自動修正PR\n\nCIの **lint** ジョブが失敗したため、`rubocop --autocorrect` で自動修正しました。\n\n**トリガーコミット**: `\($sha)`\n**コミットメッセージ**: `\($msg)`\n**CIログ**: \($log_url)\n\n### レビュー時の確認事項\n- [ ] 自動修正の内容を確認済み（意図しない変更がないか）\n- [ ] 今回のCI失敗原因を `CLAUDE.md` の「CIエラーの原因になったこと」に追記した\n- [ ] 同じ問題が再発しないようにコーディングルールを更新した（必要な場合）"' \
            -r)
          echo "$PR_BODY" > /tmp/pr_body.md
          gh pr create \
            --title "🤖 auto-fix: RuboCop lint errors ($(date +%Y-%m-%d))" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"

      # カテゴリ③: 自動修正ジョブ結果通知
      - name: Notify Slack (auto-fix PR created)
        if: steps.lint_check.outputs.lint_failed == 'true' && steps.rubocop.outputs.changed == 'true'
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${{ github.event.workflow_run.head_commit.message }}" \
            --arg pr_url "${{ github.server_url }}/${{ github.repository }}/pulls" \
            '{attachments:[{color:"#f0a500",text:":wrench: *CI lint 失敗 → 自動修正PR作成* `main`",fields:[{title:"トリガーコミット",value:$msg,short:false},{title:"次のアクション",value:"自動修正PRを確認・マージしてください: \($pr_url)",short:false}],footer:"GitHub Actions Auto Fix",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_JOBS }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      # カテゴリ③: 手動修正が必要な場合の通知
      - name: Notify Slack (lint failure, no auto-fix available)
        if: steps.lint_check.outputs.lint_failed == 'true' && steps.rubocop.outputs.changed == 'false'
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${{ github.event.workflow_run.head_commit.message }}" \
            --arg log_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            '{attachments:[{color:"#e01e5a",text:":x: *CI失敗（自動修正不可）* `main`",fields:[{title:"トリガーコミット",value:$msg,short:false},{title:"次のアクション",value:"手動で修正が必要です: \($log_url)",short:false}],footer:"GitHub Actions Auto Fix",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_JOBS }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      - name: Skip auto-fix for non-lint failures
        if: steps.lint_check.outputs.lint_failed != 'true'
        run: echo "Skipping auto-fix because lint job did not fail."

  # lint 以外のジョブ（test / job-check / route-check）が失敗した場合に Issue を起票する
  triage_ci_failures:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Collect failed jobs and create triage issue
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            const run = context.payload.workflow_run

            // 全ジョブを取得
            const response = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            })

            // lint 以外の失敗ジョブを抽出
            const NON_LINT_JOBS = ['test', 'job-check', 'route-check', 'scan_ruby', 'scan_js', 'system-test']
            const failedJobs = response.data.jobs.filter(
              j => NON_LINT_JOBS.includes(j.name) && j.conclusion === 'failure'
            )
            if (failedJobs.length === 0) {
              core.info('No non-lint job failures found, skipping issue creation')
              return
            }

            // 重複Issue防止：同じコミットで既に起票済みか確認
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 20,
            })
            const alreadyFiled = existing.data.some(i => i.title.includes(run.head_sha.substring(0, 7)))
            if (alreadyFiled) {
              core.info('Issue already filed for this commit, skipping')
              return
            }

            // ジョブごとのラベルマッピング
            const JOB_LABEL_MAP = {
              'test':        'ci-failure:test',
              'job-check':   'ci-failure:job-check',
              'route-check': 'ci-failure:route-check',
              'scan_ruby':   'ci-failure:security',
              'scan_js':     'ci-failure:security',
              'system-test': 'ci-failure:system-test',
            }

            const issueLabels = ['ci-failure']
            const jobList = failedJobs.map(j => {
              const label = JOB_LABEL_MAP[j.name]
              if (label) issueLabels.push(label)
              return `- **${j.name}**: [ログを確認](${j.html_url})`
            }).join('\n')

            // ラベルを事前作成（存在しなければ）
            const LABEL_COLORS = {
              'ci-failure':              'e4e669',
              'ci-failure:test':         'd93f0b',
              'ci-failure:job-check':    'e99695',
              'ci-failure:route-check':  'f9d0c4',
              'ci-failure:security':     'b60205',
              'ci-failure:system-test':  'fbca04',
            }
            for (const [name, color] of Object.entries(LABEL_COLORS)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name })
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description: 'Auto-created by CI triage' })
                }
              }
            }

            const uniqueLabels = [...new Set(issueLabels)]
            const shortSha = run.head_sha.substring(0, 7)
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${run.id}`

             await github.rest.issues.create({
               owner,
               repo,
               title: `🔴 CI失敗: ${failedJobs.map(j => j.name).join(', ')} [${shortSha}]`,
               body: [
                `## CI 失敗レポート`,
                ``,
                `**コミット**: [\`${shortSha}\`](${context.serverUrl}/${owner}/${repo}/commit/${run.head_sha})`,
                `**ブランチ**: \`${run.head_branch}\``,
                `**コミットメッセージ**: ${run.head_commit?.message?.split('\n')[0] ?? '(不明)'}`,
                `**CIワークフロー**: [実行ログ](${runUrl})`,
                ``,
                `## 失敗ジョブ`,
                ``,
                jobList,
                ``,
                `## 対応手順`,
                ``,
                `1. 上記ログリンクから失敗原因を確認する`,
                `2. フィーチャーブランチ（\`copilot/fix-...\` または \`claude/fix-...\`）で修正する`,
                 `3. PRを作成（CIが通れば自動マージされる）`,
                 `4. 修正完了後に \`CLAUDE.md\` の「CIエラーの原因」に追記する`,
                 ``,
                 `## Copilot 自動修正依頼`,
                 ``,
                 `@github-copilot このCI失敗を調査し、\`copilot/fix-ci-${shortSha}\` ブランチで修正PRを作成してください。`,
                 ``,
                 `---`,
                 `*このIssueはCI失敗時に自動生成されました*`,
               ].join('\n'),
               labels: uniqueLabels,
             })
            core.info(`Created triage issue for failed jobs: ${failedJobs.map(j => j.name).join(', ')}`)

      # カテゴリ③: test/check系 CI失敗通知
      - name: Notify Slack (non-lint CI failure)
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${{ github.event.workflow_run.head_commit.message }}" \
            --arg sha "${{ github.event.workflow_run.head_sha }}" \
            --arg branch "${{ github.event.workflow_run.head_branch }}" \
            --arg log_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --arg issues_url "${{ github.server_url }}/${{ github.repository }}/issues?q=is%3Aopen+label%3Aci-failure" \
            '{attachments:[{color:"#e01e5a",text:(":x: *CI失敗（test/check系）* `" + $branch + "` — Issueを確認してください"),fields:[{title:"コミット",value:$msg,short:false},{title:"SHA",value:$sha,short:true},{title:"CIログ",value:$log_url,short:false},{title:"Issue一覧",value:$issues_url,short:false}],footer:"GitHub Actions Auto Triage",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_JOBS }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
