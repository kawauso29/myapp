name: Linestamp Pack Planning

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Pack企画数(default=10)"
        required: false
        default: "10"
#  schedule:
#    - cron: '30 22 * * *' # 22:30 UTC = 翌7:30 JST
#
jobs:
  create-pack-issues:
    runs-on: [self-hosted, sakura-vps]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: List active brands from DB
        id: brands
        run: |
          eval "$(~/.rbenv/bin/rbenv init -)"
          set -a; [ -f ~/myapp/.env ] && source ~/myapp/.env; set +a
          export SECRET_KEY_BASE="${SECRET_KEY_BASE:-$(python3 -c 'import secrets; print(secrets.token_hex(64))')}"
          export DEVISE_JWT_SECRET_KEY="${DEVISE_JWT_SECRET_KEY:-$(python3 -c 'import secrets; print(secrets.token_hex(64))')}"
          BRANDS=$(RAILS_ENV=production bin/rails runner "puts Linestamp::Brand.pluck(:slug).join(',')" 2>/dev/null || echo "")
          if [ -z "$BRANDS" ]; then
            BRANDS="none"
          fi
          printf 'list=%s\n' "$BRANDS" >> "$GITHUB_OUTPUT"

      - name: Create pack planning issues
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          COUNT_INPUT: ${{ inputs.count }}
          BRAND_LIST: ${{ steps.brands.outputs.list }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "DEPLOY_TOKEN is required"
            exit 1
          fi

          COUNT="$COUNT_INPUT"
          if [ -z "$COUNT" ]; then
            COUNT="10"
          fi
          case "$COUNT" in
            ''|*[!0-9]*)
              echo "count must be a positive integer"
              exit 1
              ;;
          esac

          IFS=',' read -r -a BRANDS <<< "$BRAND_LIST"
          DATE=$(TZ=Asia/Tokyo date +"%Y-%m-%d")
          NUM_BRANDS=${#BRANDS[@]}

          if [ "$NUM_BRANDS" -eq 0 ] || [ "${BRANDS[0]}" == "none" ]; then
            echo "No brands found in DB, skipping."
            exit 0
          fi

          for i in $(seq 1 "$COUNT"); do
            BRAND=${BRANDS[$(((i - 1) % NUM_BRANDS))]}
            TIMESTAMP=$(TZ=UTC date +"%Y-%m-%d-%H%M%S")

            BODY=$(cat <<EOF
          ## ミッション
          既存ブランド \`${BRAND}\` に新しいシリーズ(Pack)を1つの Ruby seed ファイルとして作成してください。

          ## 出力ファイル
          \`db/seeds/linestamp/imports/pending/${TIMESTAMP}_pack_{slug}.rb\`
          ※ {slug} は企画したパックの slug に置き換える

          ## 仕様
          - \`db/seeds/linestamp/imports/_templates/pack_template.rb\` を雛形にする
          - \`Linestamp::Importer.run(seed_id: "${TIMESTAMP}_pack_{slug}")\` ブロック内で \`create_pack!\` を呼ぶ
          - 対象ブランド: \`Linestamp::Brand.find_by!(slug: "${BRAND}")\`
          - マスタ slug は事前に確認(\`bin/rails runner 'puts Linestamp::CommunicationTheme.pluck(:slug,:name)'\` 等)
          - 未知 slug はエラーになる
          - \`docs/linestamp/08_PLANNING_GUIDE.md\` を必読

          ## 完了条件
          - [ ] ruby -c で構文エラーなし
          - [ ] 未知マスタ slug を使っていない
          - [ ] 8枚の stamps が含まれ、各 stamp に label / primary_communication_theme 設定済み
          - [ ] communication_themes と attributes が適切に設定済み
          - [ ] PR がレビュー待ち
          EOF
            )

            export ISSUE_TITLE="[linestamp/pack] ${DATE} ${BRAND} #${i}"
            export ISSUE_BODY="$BODY"
            export ISSUE_LABELS="linestamp,pack-planning,auto"

            python3 - <<'PY' > /tmp/linestamp-pack-issue.json
          import json
          import os

          print(json.dumps({
              "title": os.environ["ISSUE_TITLE"],
              "body": os.environ["ISSUE_BODY"],
              "labels": os.environ["ISSUE_LABELS"].split(","),
          }))
          PY

            ISSUE_RESPONSE=$(curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d @/tmp/linestamp-pack-issue.json)
            ISSUE_NUMBER=$(python3 -c 'import json, sys; print(json.load(sys.stdin)["number"])' <<<"$ISSUE_RESPONSE")
            ISSUE_URL=$(python3 -c 'import json, sys; print(json.load(sys.stdin)["html_url"])' <<<"$ISSUE_RESPONSE")
            echo "Created: $ISSUE_URL"

            COMMENT_BODY="@copilot このIssueに従って ${BRAND} の新シリーズ seed ファイルを作成し、copilot/linestamp-pack-${DATE//-/}-${i} ブランチでPRを作成してください。最初に docs/linestamp/08_PLANNING_GUIDE.md を読んでください。"
            export COMMENT_BODY
            COMMENT_PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"body": os.environ["COMMENT_BODY"]}))')
            curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "$COMMENT_PAYLOAD" >/dev/null

            export AGENT_INSTRUCTIONS="このIssueに従って ${BRAND} の新シリーズ seed ファイルを作成し、copilot/linestamp-pack-${DATE//-/}-${i} ブランチでPRを作成してください。"
            export TARGET_REPO="$GITHUB_REPOSITORY"

            python3 - <<'PY' > /tmp/linestamp-pack-assignee.json
          import json
          import os

          print(json.dumps({
              "assignees": ["copilot-swe-agent[bot]"],
              "agent_assignment": {
                  "target_repo": os.environ["TARGET_REPO"],
                  "base_branch": "main",
                  "custom_instructions": os.environ["AGENT_INSTRUCTIONS"],
              },
          }))
          PY

            curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/assignees" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d @/tmp/linestamp-pack-assignee.json >/dev/null
            sleep 2
          done
