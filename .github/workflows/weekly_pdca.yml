name: 日次 PDCA ループ

# Plan→Do→Check→Act を3時間ごとに回す
#
# P (Plan)   : ai_sns_plan_status.yml の優先度順に次の施策を決定
# D (Do)     : ai_sns_plan.yml を dispatch して Copilot に実装依頼
# C (Check)  : KPI を収集して Slack にレポート
# A (Act)    : WIP 上限チェックで並行実装数を制御（上限=2）
#              todo 枯渇時は plan_review.yml を dispatch して次期計画を Copilot に依頼
#
# 実行タイミング: 3時間ごと（schedule）+ 手動（workflow_dispatch）

on:
  schedule:
    # 3時間ごとに自動実行（1日8回）
    # Copilot の実装サイクル（30分〜数時間）に対して十分な頻度
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      force_advance:
        description: "WIP上限を無視して強制的に次の項目を起票する"
        required: false
        default: "false"

concurrency:
  group: weekly-pdca
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  weekly_pdca:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4

      - name: KPI 収集
        id: kpi
        run: |
          set +e
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          KPI_JSON=$(cd ~/myapp && RAILS_ENV=production bin/rails kpi:collect 2>/dev/null)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ] || [ -z "$KPI_JSON" ]; then
            echo "KPI収集失敗 (exit=$EXIT_CODE). フォールバック値を使用"
            KPI_JSON='{"error":"collect failed","collected_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          fi
          echo "$KPI_JSON" | python3 -m json.tool 2>/dev/null || echo "$KPI_JSON"
          echo "kpi_json<<KPIDELIM" >> "$GITHUB_OUTPUT"
          echo "$KPI_JSON" >> "$GITHUB_OUTPUT"
          echo "KPIDELIM" >> "$GITHUB_OUTPUT"

      - name: WIP チェック
        id: wip
        run: |
          WIP_COUNT=$(grep -c "status: in_progress" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          WIP_COUNT=${WIP_COUNT:-0}
          TODO_COUNT=$(grep -c "status: todo" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          TODO_COUNT=${TODO_COUNT:-0}
          WIP_LIMIT=2
          FORCE="${{ github.event.inputs.force_advance }}"
          echo "wip_count=${WIP_COUNT}" >> "$GITHUB_OUTPUT"
          echo "wip_limit=${WIP_LIMIT}" >> "$GITHUB_OUTPUT"
          echo "todo_count=${TODO_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${FORCE}" = "true" ]; then
            echo "advance=true" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → 強制起票モード"
          elif [ "${WIP_COUNT}" -lt "${WIP_LIMIT}" ] && [ "${TODO_COUNT}" -gt 0 ]; then
            echo "advance=true" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT}, todo: ${TODO_COUNT} → 次の施策を自動起票します"
          elif [ "${WIP_COUNT}" -ge "${WIP_LIMIT}" ]; then
            echo "advance=false" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → WIP上限に達しているため自動起票をスキップ"
          else
            echo "advance=false" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT}, todo: ${TODO_COUNT} → 未着手項目なし（計画レビュー待ち）"
          fi
          # todo が 2 件以下なら計画レビューが必要
          if [ "${TODO_COUNT}" -le 2 ]; then
            echo "needs_plan_review=true" >> "$GITHUB_OUTPUT"
            echo "📋 todo残数: ${TODO_COUNT}件 → 計画レビューをディスパッチします"
          else
            echo "needs_plan_review=false" >> "$GITHUB_OUTPUT"
          fi

      # in_progress 項目が started_at から7日以上経過していたら todo にリセット
      - name: 滞留 in_progress 検知 & 自動リセット
        id: stale_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
        run: |
          STALE_ITEMS=$(python3 -c "
          import yaml, json
          from datetime import datetime, timezone, timedelta

          with open('docs/ai_sns_plan_status.yml') as f:
              data = yaml.safe_load(f)

          stale = []
          now = datetime.now(timezone.utc)
          stale_threshold = timedelta(days=7)

          for item_id, item in data.get('items', {}).items():
              if item.get('status') != 'in_progress':
                  continue
              started = item.get('started_at', '')
              if not started:
                  continue
              try:
                  started_dt = datetime.fromisoformat(started.replace('Z', '+00:00'))
                  age = now - started_dt
                  if age > stale_threshold:
                      stale.append({
                          'id': item_id,
                          'title': item.get('title', ''),
                          'started_at': started,
                          'age_days': age.days
                      })
              except Exception:
                  pass

          print(json.dumps(stale, ensure_ascii=False))
          ")

          STALE_COUNT=$(echo "$STALE_ITEMS" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "stale_count=${STALE_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$STALE_COUNT" -gt 0 ]; then
            echo "⚠️ ${STALE_COUNT} 件の滞留項目を検出。todo にリセットします"

            # plan_status.yml を更新（started_at を削除して status を todo に戻す）
            python3 -c "
          import yaml, json, sys
          from datetime import datetime, timezone, timedelta

          stale_items = json.loads('''$STALE_ITEMS''')
          stale_ids = {item['id'] for item in stale_items}

          with open('docs/ai_sns_plan_status.yml') as f:
              data = yaml.safe_load(f)

          for item_id in stale_ids:
              if item_id in data.get('items', {}):
                  data['items'][item_id]['status'] = 'todo'
                  data['items'][item_id].pop('started_at', None)

          with open('docs/ai_sns_plan_status.yml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
          "

            # 変更をコミット・プッシュ
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add docs/ai_sns_plan_status.yml
            if ! git diff --staged --quiet; then
              RESET_IDS=$(echo "$STALE_ITEMS" | python3 -c "import json,sys; items=json.load(sys.stdin); print(', '.join(i['id'] for i in items))")
              git commit -m "plan: 滞留項目をリセット [${RESET_IDS}]（7日超過）"
              git push origin HEAD
            fi

            # Slack 通知（エラーカテゴリ）
            if [ -n "$SLACK_WEBHOOK" ]; then
              PAYLOAD=$(python3 -c "
          import json
          stale = json.loads('''$STALE_ITEMS''')
          lines = []
          for s in stale:
              lines.append('  • [' + s['id'] + '] ' + s['title'] + ' (' + str(s['age_days']) + '日滞留)')
          text = ':warning: *PDCA: 滞留項目を自動リセット*\n以下の in_progress 項目が7日以上滞留していたため todo に戻しました:\n' + chr(10).join(lines) + '\n\n放置されたブランチ/PRがあれば手動でクローズしてください。'
          print(json.dumps({'text': text}))
          ")
              curl -s -X POST -H "Content-Type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK"
            fi
          else
            echo "✅ 滞留項目はありません"
          fi

      - name: Slack KPI レポート
        env:
          KPI_JSON: ${{ steps.kpi.outputs.kpi_json }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
        run: |
          WIP_COUNT="${{ steps.wip.outputs.wip_count }}"
          WIP_LIMIT="${{ steps.wip.outputs.wip_limit }}"
          ADVANCE="${{ steps.wip.outputs.advance }}"
          TODO_COUNT="${{ steps.wip.outputs.todo_count }}"
          NEEDS_PLAN_REVIEW="${{ steps.wip.outputs.needs_plan_review }}"

          PAYLOAD=$(python3 -c "
import json, sys, time, os

raw = os.environ.get('KPI_JSON', '{}')
try:
    d = json.loads(raw)
except Exception:
    d = {}

def g(path, default='?'):
    parts = path.split('.')
    v = d
    for p in parts:
        if not isinstance(v, dict):
            return default
        v = v.get(p)
        if v is None:
            return default
    return str(v)

wip_count = os.environ.get('WIP_COUNT', '0')
wip_limit = os.environ.get('WIP_LIMIT', '2')
advance   = os.environ.get('ADVANCE', 'false')
todo_count = os.environ.get('TODO_COUNT', '?')
needs_plan_review = os.environ.get('NEEDS_PLAN_REVIEW', 'false')
if advance == 'true':
    wip_status = ':green_circle: WIP ' + wip_count + '/' + wip_limit + ' → 次の施策を自動起票'
elif todo_count == '0':
    wip_status = ':blue_circle: WIP ' + wip_count + '/' + wip_limit + ' → 未着手項目なし（計画レビュー待ち）'
else:
    wip_status = ':yellow_circle: WIP ' + wip_count + '/' + wip_limit + ' → 上限のため起票スキップ'
plan_status = (':rotating_light: todo残 ' + todo_count + '件 → 計画レビュー起動') if needs_plan_review == 'true' else (':white_check_mark: todo残 ' + todo_count + '件')

payload = {
    'attachments': [{
        'color': '#4299e1',
        'title': '📊 日次 PDCA レポート（Check フェーズ）',
        'fields': [
            {'title': '👥 ユーザー', 'value': '総数: ' + g('users.total') + ' | 新規(週): ' + g('users.new_this_week') + ' | 有料: ' + g('users.paid') + ' | WAU: ' + g('users.wau'), 'short': False},
            {'title': '📝 AI投稿（今週）', 'value': g('posts.this_week') + '件 | 会話率: ' + g('posts.conversation_rate_pct') + '%', 'short': True},
            {'title': '❤️ エンゲージメント', 'value': 'いいね: ' + g('engagement.user_likes_this_week') + ' | お気に入り: ' + g('engagement.total_favorites'), 'short': True},
            {'title': '🤝 AI社会', 'value': '友人以上: ' + g('ai_social.friend_plus_relationships') + ' | 稼働AI: ' + g('ai_social.active_ais'), 'short': True},
            {'title': '🔄 Act（次アクション）', 'value': wip_status, 'short': True},
            {'title': '📋 計画残', 'value': plan_status, 'short': True},
        ],
        'footer': 'weekly_pdca.yml (3時間ごと自動実行)',
        'ts': int(time.time()),
    }]
}
print(json.dumps(payload))
")

          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              --data "$PAYLOAD" \
              "$SLACK_WEBHOOK"
          fi

      - name: 次の施策を自動起票（Copilot への Do 指示）
        if: steps.wip.outputs.advance == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ai_sns_plan.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✅ ai_sns_plan.yml をディスパッチしました（Do フェーズ開始）"

      - name: 起票スキップ通知
        if: steps.wip.outputs.advance == 'false'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
        run: |
          WIP_COUNT="${{ steps.wip.outputs.wip_count }}"
          WIP_LIMIT="${{ steps.wip.outputs.wip_limit }}"
          TODO_COUNT="${{ steps.wip.outputs.todo_count }}"
          PAYLOAD=$(python3 -c "
import json, os
wip_count = os.environ.get('WIP_COUNT', '0')
wip_limit = os.environ.get('WIP_LIMIT', '2')
todo_count = os.environ.get('TODO_COUNT', '0')
if todo_count == '0':
    msg = ':blue_circle: PDCA: 未着手(todo)項目がありません。計画レビューで次期施策が追加されるのを待っています。'
else:
    msg = ':yellow_circle: PDCA: WIP上限 (' + wip_count + '/' + wip_limit + ') に達しているため自動起票をスキップしました。in_progress 項目を完了させてから次のサイクルで起票します。'
print(json.dumps({'text': msg}))
")
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              --data "$PAYLOAD" \
              "$SLACK_WEBHOOK"
          fi

      # Act フェーズ: todo 枯渇時に計画レビュー・次期計画生成を自動起動
      - name: 計画レビュー ディスパッチ（todo 枯渇時）
        if: steps.wip.outputs.needs_plan_review == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/plan_review.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✅ plan_review.yml をディスパッチしました（Act フェーズ: 計画レビュー開始）"
