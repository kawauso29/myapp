name: 週次 PDCA ループ

# Plan→Do→Check→Act を毎週自動で回す
#
# P (Plan)   : ai_sns_plan_status.yml の優先度順に次の施策を決定
# D (Do)     : ai_sns_plan.yml を dispatch して Copilot に実装依頼
# C (Check)  : KPI を収集して Slack にレポート
# A (Act)    : WIP 上限チェックで並行実装数を制御（上限=2）
#
# 実行タイミング: 毎週月曜 9:00 JST (0:00 UTC)

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      force_advance:
        description: "WIP上限を無視して強制的に次の項目を起票する"
        required: false
        default: "false"

permissions:
  contents: read
  actions: write

jobs:
  weekly_pdca:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4

      - name: KPI 収集
        id: kpi
        run: |
          set +e
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          KPI_JSON=$(cd ~/myapp && RAILS_ENV=production bin/rails kpi:collect 2>/dev/null)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ] || [ -z "$KPI_JSON" ]; then
            echo "KPI収集失敗 (exit=$EXIT_CODE). フォールバック値を使用"
            KPI_JSON='{"error":"collect failed","collected_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          fi
          echo "$KPI_JSON" | jq . || true
          echo "kpi_json<<KPIDELIM" >> "$GITHUB_OUTPUT"
          echo "$KPI_JSON" >> "$GITHUB_OUTPUT"
          echo "KPIDELIM" >> "$GITHUB_OUTPUT"

      - name: WIP チェック
        id: wip
        run: |
          WIP_COUNT=$(grep -c "status: in_progress" docs/ai_sns_plan_status.yml 2>/dev/null || echo 0)
          WIP_LIMIT=2
          FORCE="${{ github.event.inputs.force_advance }}"
          echo "wip_count=${WIP_COUNT}" >> "$GITHUB_OUTPUT"
          echo "wip_limit=${WIP_LIMIT}" >> "$GITHUB_OUTPUT"
          if [ "${WIP_COUNT}" -lt "${WIP_LIMIT}" ] || [ "${FORCE}" = "true" ]; then
            echo "advance=true" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → 次の施策を自動起票します"
          else
            echo "advance=false" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → WIP上限に達しているため自動起票をスキップ"
          fi

      - name: Slack KPI レポート
        env:
          KPI_JSON: ${{ steps.kpi.outputs.kpi_json }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI != '' && secrets.SLACK_WEBHOOK_URL_CI || secrets.SLACK_WEBHOOK_URL }}
        run: |
          WIP_COUNT="${{ steps.wip.outputs.wip_count }}"
          WIP_LIMIT="${{ steps.wip.outputs.wip_limit }}"
          ADVANCE="${{ steps.wip.outputs.advance }}"

          TOTAL_USERS=$(echo "$KPI_JSON" | jq -r '.users.total // "?"')
          NEW_USERS=$(echo "$KPI_JSON" | jq -r '.users.new_this_week // "?"')
          WAU=$(echo "$KPI_JSON" | jq -r '.users.wau // "?"')
          PAID=$(echo "$KPI_JSON" | jq -r '.users.paid // "?"')
          POSTS_WEEK=$(echo "$KPI_JSON" | jq -r '.posts.this_week // "?"')
          CONV_RATE=$(echo "$KPI_JSON" | jq -r '.posts.conversation_rate_pct // "?"')
          LIKES_WEEK=$(echo "$KPI_JSON" | jq -r '.engagement.user_likes_this_week // "?"')
          FAVORITES=$(echo "$KPI_JSON" | jq -r '.engagement.total_favorites // "?"')
          FRIENDS=$(echo "$KPI_JSON" | jq -r '.ai_social.friend_plus_relationships // "?"')
          ACTIVE_AIS=$(echo "$KPI_JSON" | jq -r '.ai_social.active_ais // "?"')

          if [ "$ADVANCE" = "true" ]; then
            WIP_STATUS=":green_circle: WIP ${WIP_COUNT}/${WIP_LIMIT} → 次の施策を自動起票"
          else
            WIP_STATUS=":yellow_circle: WIP ${WIP_COUNT}/${WIP_LIMIT} → 上限のため起票スキップ"
          fi

          PAYLOAD=$(jq -n \
            --arg total_users "$TOTAL_USERS" \
            --arg new_users "$NEW_USERS" \
            --arg wau "$WAU" \
            --arg paid "$PAID" \
            --arg posts_week "$POSTS_WEEK" \
            --arg conv_rate "$CONV_RATE" \
            --arg likes_week "$LIKES_WEEK" \
            --arg favorites "$FAVORITES" \
            --arg friends "$FRIENDS" \
            --arg active_ais "$ACTIVE_AIS" \
            --arg wip_status "$WIP_STATUS" \
            '{
              attachments: [{
                color: "#4299e1",
                title: "📊 週次 PDCA レポート（Check フェーズ）",
                fields: [
                  {
                    title: "👥 ユーザー",
                    value: ("総数: " + $total_users + " | 新規(週): " + $new_users + " | 有料: " + $paid + " | WAU: " + $wau),
                    short: false
                  },
                  {
                    title: "📝 AI投稿（今週）",
                    value: ($posts_week + "件 | 会話率: " + $conv_rate + "%"),
                    short: true
                  },
                  {
                    title: "❤️ エンゲージメント",
                    value: ("いいね: " + $likes_week + " | お気に入り: " + $favorites),
                    short: true
                  },
                  {
                    title: "🤝 AI社会",
                    value: ("友人以上: " + $friends + " | 稼働AI: " + $active_ais),
                    short: true
                  },
                  {
                    title: "🔄 Act（次アクション）",
                    value: $wip_status,
                    short: true
                  }
                ],
                footer: "weekly_pdca.yml",
                ts: now | floor
              }]
            }')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK"

      - name: 次の施策を自動起票（Copilot への Do 指示）
        if: steps.wip.outputs.advance == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ai_sns_plan.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✅ ai_sns_plan.yml をディスパッチしました（Do フェーズ開始）"

      - name: WIP 上限通知（スキップ時）
        if: steps.wip.outputs.advance == 'false'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI != '' && secrets.SLACK_WEBHOOK_URL_CI || secrets.SLACK_WEBHOOK_URL }}
        run: |
          WIP_COUNT="${{ steps.wip.outputs.wip_count }}"
          WIP_LIMIT="${{ steps.wip.outputs.wip_limit }}"
          PAYLOAD=$(jq -n \
            --arg wip_count "$WIP_COUNT" \
            --arg wip_limit "$WIP_LIMIT" \
            '{
              text: (":yellow_circle: 週次 PDCA: WIP上限 (" + $wip_count + "/" + $wip_limit + ") に達しているため自動起票をスキップしました。in_progress 項目を完了させてから次のサイクルで起票します。")
            }')
          curl -s -X POST \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK"
