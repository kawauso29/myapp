name: CI

on:
  pull_request:
  push:
    branches: [ main, 'claude/**', 'copilot/**', 'auto-fix/**' ]

# 同一ブランチの重複CIを防止（PR作成時のpull_requestイベントがpushイベントのCIをキャンセル）
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  scan_ruby:
    runs-on: [self-hosted, sakura-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: [self-hosted, sakura-vps]
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  job-check:
    runs-on: [self-hosted, sakura-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Check job autoload and run job specs
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:create
          bin/rails db:migrate || bin/rails db:schema:load
          bin/rails db:test:prepare
          bin/rails zeitwerk:check && bundle exec rspec spec/jobs

  route-check:
    runs-on: [self-hosted, sakura-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Check controller and API route integrity
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:create
          bin/rails db:migrate || bin/rails db:schema:load
          bin/rails db:test:prepare
          bundle exec rspec spec/routing/controller_action_integrity_spec.rb

  test:
    runs-on: [self-hosted, sakura-vps]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:create
          bin/rails db:migrate || bin/rails db:schema:load
          bin/rails db:test:prepare
          bundle exec rspec

  notify:
    runs-on: [self-hosted, sakura-vps]
    needs: [scan_ruby, lint, job-check, route-check, test]
    if: always()
    steps:
      - name: Build notification label
        id: notify_context
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          PR_NUMBER="${{ github.event.pull_request.number || '' }}"
          if [ -n "${PR_NUMBER}" ]; then
            NOTIFY_LABEL="PR #${PR_NUMBER} (${BRANCH})"
          else
            NOTIFY_LABEL="${BRANCH}"
          fi
          echo "notify_label=${NOTIFY_LABEL}" >> "$GITHUB_OUTPUT"

      # カテゴリ①: CI進捗/成功通知（jq未使用: self-hosted runner に jq がないため python3 で生成）
      - name: Notify Slack (success)
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          NOTIFY_LABEL: ${{ steps.notify_context.outputs.notify_label }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping success notification"
            exit 0
          fi
          if ! printf '%s' "${WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping success notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c "
          import json, os, time
          notify_label = os.environ['NOTIFY_LABEL']
          actor = os.environ['ACTOR']
          msg = os.environ['COMMIT_MSG']
          link = os.environ['RUN_LINK']
          payload = {'attachments': [{'color': '#2eb886', 'text': f':white_check_mark: *CI passed* {notify_label} by {actor}', 'fields': [{'title': 'コミット', 'value': msg, 'short': False}, {'title': 'リンク', 'value': link, 'short': False}], 'footer': 'GitHub Actions', 'ts': int(time.time())}]}
          print(json.dumps(payload))
          ")
          curl -s -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" || echo "Slack success notification failed; continuing"

      # カテゴリ①: CI失敗通知（ci-deploy チャネルへ通知。jq未使用: self-hosted runner に jq がないため python3 で生成）
      - name: Notify Slack (failure)
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          NOTIFY_LABEL: ${{ steps.notify_context.outputs.notify_label }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RESULT_SCAN_RUBY: ${{ needs.scan_ruby.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_JOB_CHECK: ${{ needs.job-check.result }}
          RESULT_ROUTE_CHECK: ${{ needs.route-check.result }}
          RESULT_TEST: ${{ needs.test.result }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping failure notification"
            exit 0
          fi
          if ! printf '%s' "${WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping failure notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c "
          import json, os, time
          notify_label = os.environ['NOTIFY_LABEL']
          actor = os.environ['ACTOR']
          msg = os.environ['COMMIT_MSG']
          link = os.environ['RUN_LINK']
          result = f\"scan_ruby: {os.environ['RESULT_SCAN_RUBY']} | lint: {os.environ['RESULT_LINT']} | job-check: {os.environ['RESULT_JOB_CHECK']} | route-check: {os.environ['RESULT_ROUTE_CHECK']} | test: {os.environ['RESULT_TEST']}\"
          fields = [
              {'title': 'コミット', 'value': msg, 'short': False},
              {'title': '結果', 'value': result, 'short': False},
              {'title': 'リンク', 'value': link, 'short': False},
          ]
          if os.environ['EVENT_NAME'] == 'push' and os.environ['REF_NAME'] == 'main':
              fields.append({'title': 'デプロイ', 'value': 'main の CI が失敗したため、自動デプロイは実行されません', 'short': False})
          payload = {'attachments': [{'color': '#e01e5a', 'text': f':x: *CI failed* {notify_label} by {actor}', 'fields': fields, 'footer': 'GitHub Actions', 'ts': int(time.time())}]}
          print(json.dumps(payload))
          ")
          curl -s -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" || echo "Slack failure notification failed; continuing"

  # main の CI 成功後に deploy.yml を直接 dispatch する
  # workflow_run トリガーが self-hosted runner 移行後に発火しなくなったため、
  # CI から直接 deploy を起動する（auto_merge.yml と同じ方式）
  dispatch_deploy:
    runs-on: [self-hosted, sakura-vps]
    needs: [scan_ruby, lint, job-check, route-check, test]
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      actions: write
    steps:
      - name: Dispatch deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            // 最大3回リトライ（GitHub がワークフロー定義を認識するまでの遅延対策）
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                  inputs: {
                    reason: `Auto-deploy after CI pass on main: ${context.sha.substring(0, 7)}`
                  }
                });
                core.info(`Dispatched deploy.yml successfully (attempt ${attempt})`);
                break;
              } catch (error) {
                if (attempt < 3) {
                  const delay = attempt * 5;
                  core.warning(`Deploy dispatch attempt ${attempt}/3 failed: ${error.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  throw error;
                }
              }
            }
