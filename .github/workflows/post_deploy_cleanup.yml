name: Post Deploy PR Cleanup

on:
  workflow_run:
    workflows: ["Deploy to Sakura VPS"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  mark_deployed_and_cleanup:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Mark deployed PR and cleanup branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const run = context.payload.workflow_run
            const deployRunUrl = `${run.html_url}`

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: run.head_sha,
            })

            const prs = associated.data || []
            if (prs.length === 0) {
              core.info(`No PR associated with commit ${run.head_sha}`)
              return
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: "deployed",
                color: "0e8a16",
                description: "Merged and deployed to production",
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            for (const pr of prs) {
              if (pr.state !== "closed" || !pr.merged_at || pr.base.ref !== "main") {
                core.info(`Skip PR #${pr.number} (state=${pr.state}, merged_at=${pr.merged_at}, base=${pr.base.ref})`)
                continue
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ["deployed"],
              })

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `✅ Deployed to production.\n\n- Deploy run: ${deployRunUrl}\n- Commit: \`${run.head_sha}\``,
              })

              const headRepo = pr.head.repo?.full_name
              const headRef = pr.head.ref
              if (headRepo !== `${owner}/${repo}`) {
                core.info(`Skip branch delete for PR #${pr.number} (fork branch)`)
                continue
              }

              if (!/^(claude|copilot|auto-fix)\//.test(headRef)) {
                core.info(`Skip branch delete for PR #${pr.number} (branch ${headRef} is not target prefix)`)
                continue
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${headRef}`,
                })
                core.info(`Deleted remote branch ${headRef} for PR #${pr.number}`)
              } catch (error) {
                if (error.status === 422 || error.status === 404) {
                  core.warning(`Could not delete branch ${headRef}: ${error.message}`)
                  continue
                }
                throw error
              }
            }
