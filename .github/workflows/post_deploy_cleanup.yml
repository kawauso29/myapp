name: Post Deploy PR Cleanup

on:
  workflow_run:
    workflows: ["Deploy to Sakura VPS"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  mark_deployed_and_cleanup:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, sakura-vps]
    steps:
      - name: Mark deployed PR and cleanup branch
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            const run = context.payload.workflow_run
            const deployRunUrl = `${run.html_url}`

            const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: run.head_sha,
            })

            const prs = associated.data || []

            if (prs.length > 0) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: "deployed",
                  color: "0e8a16",
                  description: "Merged and deployed to production",
                })
              } catch (error) {
                if (error.status !== 422) throw error
              }

              for (const pr of prs) {
                if (pr.state !== "closed" || !pr.merged_at || pr.base.ref !== "main") {
                  core.info(`Skip PR #${pr.number} (state=${pr.state}, merged_at=${pr.merged_at}, base=${pr.base.ref})`)
                  continue
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: ["deployed"],
                })

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `✅ Deployed to production.\n\n- Deploy run: ${deployRunUrl}\n- Commit: \`${run.head_sha}\``,
                })

                // PRに紐づいているci-failureのIssueがあれば自動クローズ
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner,
                  repo,
                  labels: 'ci-failure',
                  state: 'open',
                  per_page: 50,
                })
                const shortSha = run.head_sha.substring(0, 7)
                for (const issue of issues) {
                  if (issue.title.includes(shortSha)) {
                    await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' })
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: issue.number,
                      body: `✅ デプロイ成功により自動クローズしました。\n\n関連PR: #${pr.number}\nデプロイ: ${deployRunUrl}`,
                    })
                    core.info(`Auto-closed ci-failure issue #${issue.number}`)
                  }
                }

                const headRepo = pr.head.repo?.full_name
                const headRef = pr.head.ref
                if (headRepo !== `${owner}/${repo}`) {
                  core.info(`Skip branch delete for PR #${pr.number} (fork branch)`)
                  continue
                }

                if (!/^(claude|copilot|auto-fix|deploy-failure)\//.test(headRef)) {
                  core.info(`Skip branch delete for PR #${pr.number} (branch ${headRef} is not target prefix)`)
                  continue
                }

                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${headRef}`,
                  })
                  core.info(`Deleted remote branch ${headRef} for PR #${pr.number}`)
                } catch (error) {
                  if (error.status === 422 || error.status === 404) {
                    core.warning(`Could not delete branch ${headRef}: ${error.message}`)
                    continue
                  }
                  throw error
                }
              }
            } else {
              core.info(`No PR associated with commit ${run.head_sha}`)
            }

            // deploy-failure PRがあればデプロイ成功時に自動クローズ（関連PRの有無に関係なく実行）
            const { data: deployFailurePrs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 50,
            })
            for (const dfPr of deployFailurePrs) {
              const hasLabel = dfPr.labels.some(l => l.name === 'deploy-failure')
              if (!hasLabel) continue
              await github.rest.pulls.update({ owner, repo, pull_number: dfPr.number, state: 'closed' })
              await github.rest.issues.createComment({
                owner, repo, issue_number: dfPr.number,
                body: `✅ デプロイ成功により自動クローズしました。\n\nデプロイ: ${deployRunUrl}`,
              })
              core.info(`Auto-closed deploy-failure PR #${dfPr.number}`)
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${dfPr.head.ref}` })
                core.info(`Deleted branch ${dfPr.head.ref}`)
              } catch (e) {
                if (e.status !== 422 && e.status !== 404) throw e
              }
            }

  # デプロイ失敗時に修正用PRを自動起票する
  create_deploy_failure_pr:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure deploy-failure label exists
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'deploy-failure' })
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: 'deploy-failure', color: 'b60205',
                  description: 'Auto-created on deploy failure'
                })
              }
            }

      - name: Create deploy failure branch
        id: create_branch
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          BRANCH="deploy-failure/fix-${SHORT_SHA}"
          DATE=$(date +%Y-%m-%d)
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          mkdir -p docs/deploy-failures
          {
            echo "# デプロイ失敗レポート [${SHORT_SHA}]"
            echo ""
            echo "- **日時**: ${DATE}"
            echo "- **コミット**: \`${HEAD_SHA}\`"
            echo "- **コミットメッセージ**: ${COMMIT_MSG}"
            echo "- **ログ**: ${RUN_URL}"
            echo ""
            echo "## 対応状況"
            echo ""
            echo "- [ ] 原因調査"
            echo "- [ ] 修正コミット追加"
            echo "- [ ] 再デプロイ確認"
            echo "- [ ] CLAUDE.md の「過去の障害記録」に追記"
          } > "docs/deploy-failures/${DATE}-${SHORT_SHA}.md"

          git add -A
          git commit -m "deploy-failure: record failure for ${SHORT_SHA}"
          git push origin "$BRANCH"

      - name: Create deploy failure PR
        id: create_pr
        uses: actions/github-script@v9
        with:
          script: |
            const shortSha = '${{ steps.create_branch.outputs.short_sha }}';
            const branch = '${{ steps.create_branch.outputs.branch }}';
            const headSha = '${{ github.event.workflow_run.head_sha }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const commitMsg = `${{ github.event.workflow_run.head_commit.message }}`.split('\n')[0];

            // 重複チェック
            const { data: existingPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 10
            });
            if (existingPrs.length > 0) {
              core.info(`Deploy failure PR already exists for ${shortSha}`);
              core.setOutput('pr_url', '');
              return;
            }

            const body = [
              '## デプロイ失敗レポート',
              '',
              `**コミット**: \`${shortSha}\` (\`${headSha}\`)`,
              `**コミットメッセージ**: ${commitMsg}`,
              `**デプロイログ**: ${runUrl}`,
              '',
              '## 対応手順',
              '',
              `1. [デプロイログ](${runUrl}) でエラー原因を確認する`,
              "2. VPS上で確認: `cd ~/myapp && RAILS_ENV=production rails runner \"puts 'OK'\" 2>&1 | head -5`",
              '3. このブランチに修正コミットを追加する',
              '4. 修正後にPRをマージして再デプロイする',
              '5. 修正完了後に `CLAUDE.md` の「過去の障害記録」に追記する',
              '',
              '---',
              '*このPRはデプロイ失敗時に自動生成されました*'
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 デプロイ失敗 [${shortSha}]`,
              body: body,
              head: branch,
              base: 'main'
            });

            // Add deploy-failure label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['deploy-failure']
            });

            core.setOutput('pr_url', pr.html_url);
            core.info(`Created deploy failure PR: ${pr.html_url}`);

      # カテゴリ②: デプロイ失敗PR起票通知
      - name: Notify Slack (deploy failure PR created)
        if: steps.create_pr.outputs.pr_url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          LOG_URL: ${{ github.event.workflow_run.html_url }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c "
          import json, os, time
          sha = os.environ.get('SHA', '')
          log_url = os.environ.get('LOG_URL', '')
          pr_url = os.environ.get('PR_URL', '')
          print(json.dumps({'attachments': [{'color': '#b60205', 'text': ':fire: *デプロイ失敗 — PRが自動起票されました*', 'fields': [{'title': 'SHA', 'value': sha, 'short': True}, {'title': 'デプロイログ', 'value': log_url, 'short': False}, {'title': 'PR', 'value': pr_url, 'short': False}], 'footer': 'GitHub Actions Post Deploy', 'ts': int(time.time())}]}))
          ")
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
