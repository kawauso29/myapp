name: Close Session on Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  close_session:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close Copilot agent session for merged PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const { owner, repo } = context.repo;

            const ALLOWED_PREFIXES = ['claude/', 'copilot/'];
            if (!ALLOWED_PREFIXES.some(p => branch.startsWith(p))) {
              core.info(`Branch "${branch}" is not a Copilot/Claude branch, skipping`);
              return;
            }

            core.info(`PR #${pr.number} merged. Branch: ${branch}. Closing Copilot agent sessions...`);

            // Copilotエージェントセッション一覧を取得
            let sessions = [];
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/copilot/sessions', {
                owner,
                repo,
                headers: { 'X-GitHub-Api-Version': '2022-11-28' },
              });
              sessions = response.data?.sessions ?? response.data ?? [];
            } catch (error) {
              core.warning(`Failed to list Copilot sessions (status: ${error.status}): ${error.message}`);
              return;
            }

            if (sessions.length === 0) {
              core.info('No active Copilot sessions found');
              return;
            }

            // マージされたPRに紐づくactiveセッションを特定してcompに更新
            let closedCount = 0;
            for (const session of sessions) {
              const sessionPrNumber = session.pull_request?.number ?? session.pr_number;
              const sessionBranch = session.branch ?? session.head_ref;
              const sessionStatus = session.status ?? session.state;

              const isMatch =
                sessionPrNumber === pr.number ||
                sessionBranch === branch;

              if (!isMatch || sessionStatus !== 'active') continue;

              const sessionId = session.id ?? session.session_id;
              core.info(`Updating session ${sessionId} to comp for PR #${pr.number}`);

              try {
                await github.request('PATCH /repos/{owner}/{repo}/copilot/sessions/{session_id}', {
                  owner,
                  repo,
                  session_id: sessionId,
                  status: 'comp',
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' },
                });
                core.info(`Session ${sessionId} updated to comp`);
                closedCount++;
              } catch (error) {
                core.warning(`Failed to update session ${sessionId} (status: ${error.status}): ${error.message}`);
              }
            }

            core.info(`Updated ${closedCount} active session(s) to comp for PR #${pr.number}`);
