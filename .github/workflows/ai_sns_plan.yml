name: AI SNS 計画 自動進行

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: "実装する項目ID（空の場合は次の高優先度項目を自動選択）"
        required: false
        default: ""
  schedule:
    - cron: "*/10 * * * *"  # 10分おき

permissions:
  contents: write
  pull-requests: write

jobs:
  advance_plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: WIP 上限チェック
        id: wip_check
        run: |
          WIP_COUNT=$(grep -c "status: in_progress" docs/ai_sns_plan_status.yml 2>/dev/null || true)
          WIP_COUNT=${WIP_COUNT:-0}
          echo "wip_count=${WIP_COUNT}" >> "$GITHUB_OUTPUT"
          echo "wip_exceeded=false" >> "$GITHUB_OUTPUT"
          echo "WIP: ${WIP_COUNT} → WIP制限なし、起票可能"

      - name: 次の実装項目を選択
        id: select
        if: steps.wip_check.outputs.wip_exceeded == 'false'
        run: |
          INPUT_ID="${{ github.event.inputs.item_id }}"

          select_todo() {
            local priority="$1"
            yq ".items | to_entries | map(select(.value.status == \"todo\" and .value.priority == \"${priority}\")) | .[0].key // \"\"" \
              docs/ai_sns_plan_status.yml
          }

          if [ -n "$INPUT_ID" ] && [ "$INPUT_ID" != "" ]; then
            ITEM_ID="$INPUT_ID"
          else
            # 高→中→低の優先度順で次の todo を探す
            ITEM_ID=$(select_todo "high")
            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              ITEM_ID=$(select_todo "medium")
            fi
            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              ITEM_ID=$(select_todo "low")
            fi
          fi

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "全項目が完了済みです。スキップします。"
            exit 0
          fi

          STATUS=$(yq ".items.${ITEM_ID}.status" docs/ai_sns_plan_status.yml)
          if [ "$STATUS" = "done" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[${ITEM_ID}] は実装済みです。スキップします。"
            exit 0
          fi
          if [ "$STATUS" = "in_progress" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[${ITEM_ID}] は既に実装中です。スキップします。"
            exit 0
          fi

          TITLE=$(yq ".items.${ITEM_ID}.title" docs/ai_sns_plan_status.yml)
          CATEGORY=$(yq ".items.${ITEM_ID}.category" docs/ai_sns_plan_status.yml)
          PRIORITY=$(yq ".items.${ITEM_ID}.priority" docs/ai_sns_plan_status.yml)
          NOTES=$(yq ".items.${ITEM_ID}.notes" docs/ai_sns_plan_status.yml)
          KPI_HYPOTHESIS=$(yq ".items.${ITEM_ID}.kpi_hypothesis // \"\"" docs/ai_sns_plan_status.yml)

          echo "item_id=${ITEM_ID}" >> "$GITHUB_OUTPUT"
          echo "item_title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "item_category=${CATEGORY}" >> "$GITHUB_OUTPUT"
          echo "item_priority=${PRIORITY}" >> "$GITHUB_OUTPUT"
          echo "item_notes=${NOTES}" >> "$GITHUB_OUTPUT"
          echo "item_kpi_hypothesis=${KPI_HYPOTHESIS}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "選択された項目: [${ITEM_ID}] ${TITLE}"

      - name: ステータスを in_progress に更新してコミット
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        run: |
          ITEM_ID="${{ steps.select.outputs.item_id }}"
          yq -i ".items.${ITEM_ID}.status = \"in_progress\"" docs/ai_sns_plan_status.yml
          yq -i "del(.items.${ITEM_ID}.completed_at)" docs/ai_sns_plan_status.yml

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/ai_sns_plan_status.yml
          git diff --staged --quiet || git commit -m "plan: [${ITEM_ID}] ステータスを in_progress に更新"
          git push origin HEAD

      - name: 実装用ブランチを作成して push
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        id: create_branch
        run: |
          ITEM_ID="${{ steps.select.outputs.item_id }}"
          BRANCH="copilot/ai-sns-${ITEM_ID}"

          # リモートブランチが既に存在する場合は削除してから再作成
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            echo "既存のリモートブランチ ${BRANCH} を削除します"
            git push origin --delete "$BRANCH" || true
          fi

          git checkout -b "$BRANCH"
          # 空コミット(--allow-empty)ではなく、started_atタイムスタンプを追加して
          # ブランチがmainと実ファイル差分を持つようにする（空PRマージ防止）
          yq -i ".items.${ITEM_ID}.started_at = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" docs/ai_sns_plan_status.yml
          git add docs/ai_sns_plan_status.yml
          git commit -m "chore: [${ITEM_ID}] 実装PR開始"
          git push origin "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: 実装依頼 PR を作成
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        id: create_pr
        uses: actions/github-script@v9
        with:
          script: |
            const itemId = '${{ steps.select.outputs.item_id }}'
            const title = '${{ steps.select.outputs.item_title }}'
            const category = '${{ steps.select.outputs.item_category }}'
            const priority = '${{ steps.select.outputs.item_priority }}'
            const notes = '${{ steps.select.outputs.item_notes }}'
            const kpiHypothesis = '${{ steps.select.outputs.item_kpi_hypothesis }}'
            const branch = '${{ steps.create_branch.outputs.branch }}'

            // 既存のオープンPRがあるか確認
            const { data: existingPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open'
            })

            if (existingPrs.length > 0) {
              const existing = existingPrs[0]
              console.log(`既存のPRが見つかりました: #${existing.number} ${existing.html_url}`)
              core.setOutput('pr_number', existing.number)
              core.setOutput('pr_url', existing.html_url)
              core.setOutput('pr_existed', 'true')
              return
            }

            const priorityLabel = { high: '★★★ 高', medium: '★★☆ 中', low: '★☆☆ 低' }[priority] || priority

            const body = [
              `## AI SNS 改良計画 実装依頼 [${itemId}]`,
              '',
              `**項目**: ${title}`,
              `**優先度**: ${priorityLabel}`,
              `**カテゴリ**: ${category}`,
              '',
              '### 概要',
              notes,
              '',
              kpiHypothesis ? `### KPI 仮説（Do 後に Check する指標）\n${kpiHypothesis}\n` : '',
              '### 参考ドキュメント',
              '- `docs/ai_sns_improvement_plan.md` — 全体計画書',
              '- `docs/ai_sns_plan_status.yml` — 進捗管理ファイル',
              '',
              '### 実装完了後の手順',
              `実装が完了したら \`docs/ai_sns_plan_status.yml\` の \`${itemId}.status\` を \`done\` に更新してこのPRに含めてください。`
            ].join('\n')

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI SNS計画] [${itemId}] ${title}`,
              body,
              head: branch,
              base: 'main',
              draft: true
            })

            console.log(`PR created: #${pr.number} ${pr.html_url}`)
            core.setOutput('pr_number', pr.number)
            core.setOutput('pr_url', pr.html_url)
            core.setOutput('pr_existed', 'false')

      - name: Copilot に実装を依頼（PRコメント）
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false' && steps.create_pr.outputs.pr_existed != 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.create_pr.outputs.pr_number }}', 10)
            const itemId = '${{ steps.select.outputs.item_id }}'
            const title = '${{ steps.select.outputs.item_title }}'

            const comment = [
              `@copilot \`docs/ai_sns_improvement_plan.md\` の計画書を参照し、既存コードとの整合性を保ちながら **[${itemId}] ${title}** を実装してください。`,
              '',
              `実装後は \`docs/ai_sns_plan_status.yml\` の \`${itemId}.status\` を \`done\` に更新してください。`,
              '',
              '<!-- copilot:model claude-opus-4.6 -->'
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            })

            console.log(`Copilot 実装依頼コメントを PR #${prNumber} に投稿しました`)

      - name: Slack 通知
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false' && steps.create_pr.outputs.pr_existed != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL が未設定のためスキップ"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg item_id "${{ steps.select.outputs.item_id }}" \
            --arg title "${{ steps.select.outputs.item_title }}" \
            --arg pr_url "${{ steps.create_pr.outputs.pr_url }}" \
            --arg pr_num "${{ steps.create_pr.outputs.pr_number }}" \
            '{
              text: ("🤖 AI SNS計画 次の実装を Copilot に依頼しました\n" +
                     "*[" + $item_id + "]* " + $title + "\n" +
                     "PR #" + $pr_num + ": " + $pr_url)
            }')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: 全項目完了通知
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
        run: |
          echo "🎉 AI SNS 改良計画の全項目が完了済みです"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n '{ text: "🎉 AI SNS 改良計画の全項目が完了しました！" }')
            curl -s -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          fi
