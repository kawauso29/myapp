name: AI SNS 計画 自動進行

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: "実装する項目ID（空の場合は次の高優先度項目を自動選択）"
        required: false
        default: ""

concurrency:
  group: ai-sns-plan
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  advance_plan:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: WIP 上限チェック
        id: wip_check
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          WIP_COUNT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "print TicketLedger.ai_sns_plan.status_executing.count" 2>/dev/null || echo 0)
          WIP_COUNT=${WIP_COUNT:-0}
          WIP_LIMIT=2
          echo "wip_count=${WIP_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "${WIP_COUNT}" -ge "${WIP_LIMIT}" ]; then
            echo "wip_exceeded=true" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → 上限に達しているためスキップ"
          else
            echo "wip_exceeded=false" >> "$GITHUB_OUTPUT"
            echo "WIP: ${WIP_COUNT}/${WIP_LIMIT} → WIP制限内、起票可能"
          fi

      - name: 次の実装項目を選択
        id: select
        if: steps.wip_check.outputs.wip_exceeded == 'false'
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          INPUT_ID="${{ github.event.inputs.item_id }}"

          if [ -n "$INPUT_ID" ] && [ "$INPUT_ID" != "" ]; then
            ITEM_JSON=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
              require 'json'
              t = TicketLedger.find_ai_sns_plan_by_item_key('${INPUT_ID}')
              if t
                legacy_status = { 'draft' => 'todo', 'executing' => 'in_progress', 'completed' => 'done' }[t.status] || t.status
                print({
                  item_key: t.ai_sns_plan_item_key,
                  status: legacy_status,
                  title: t.title,
                  category: t.improvement_pattern_key,
                  priority: t.priority,
                  notes: Admin::AiSnsPlanService.legacy_notes_for(t.ai_sns_plan_item_key),
                  kpi_hypothesis: t.kpi_hypothesis
                }.to_json)
              else
                print '{}'
              end
            " 2>/dev/null || echo "{}")
          else
            ITEM_JSON=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
              require 'json'
              t = TicketLedger.ai_sns_plan.status_draft.order(priority: :desc, idempotency_key: :asc).first
              if t
                print({
                  item_key: t.ai_sns_plan_item_key,
                  status: 'todo',
                  title: t.title,
                  category: t.improvement_pattern_key,
                  priority: t.priority,
                  notes: Admin::AiSnsPlanService.legacy_notes_for(t.ai_sns_plan_item_key),
                  kpi_hypothesis: t.kpi_hypothesis
                }.to_json)
              else
                print '{}'
              end
            " 2>/dev/null || echo "{}")
          fi

          ITEM_ID=$(echo "$ITEM_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('item_key',''))" 2>/dev/null || echo "")
          STATUS=$(echo "$ITEM_JSON"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "全項目が完了済みです。スキップします。"
            exit 0
          fi

          if [ "$STATUS" = "done" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[${ITEM_ID}] は実装済みです。スキップします。"
            exit 0
          fi
          if [ "$STATUS" = "in_progress" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[${ITEM_ID}] は既に実装中です。スキップします。"
            exit 0
          fi

          TITLE=$(echo "$ITEM_JSON"         | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('title',''))" 2>/dev/null || echo "")
          CATEGORY=$(echo "$ITEM_JSON"      | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('category',''))" 2>/dev/null || echo "")
          PRIORITY=$(echo "$ITEM_JSON"      | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('priority',''))" 2>/dev/null || echo "")
          NOTES=$(echo "$ITEM_JSON"         | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('notes',''))" 2>/dev/null || echo "")
          KPI_HYPOTHESIS=$(echo "$ITEM_JSON"| python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('kpi_hypothesis',''))" 2>/dev/null || echo "")

          echo "item_id=${ITEM_ID}" >> "$GITHUB_OUTPUT"
          echo "item_title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "item_category=${CATEGORY}" >> "$GITHUB_OUTPUT"
          echo "item_priority=${PRIORITY}" >> "$GITHUB_OUTPUT"
          echo "item_notes=${NOTES}" >> "$GITHUB_OUTPUT"
          echo "item_kpi_hypothesis=${KPI_HYPOTHESIS}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          echo "選択された項目: [${ITEM_ID}] ${TITLE}"

      - name: ステータスを in_progress に更新（DB）
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          ITEM_ID="${{ steps.select.outputs.item_id }}"
          cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find_ai_sns_plan_by_item_key('${ITEM_ID}')
            if t
              t.skip_template_guard = true
              t.skip_lane_capacity_guard = true
              t.skip_pr_guardrail = true
              t.skip_stop_guard = true
              t.update!(status: :executing)
            end
          "

      - name: 実装用ブランチを作成して push
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        id: create_branch
        run: |
          ITEM_ID="${{ steps.select.outputs.item_id }}"
          BRANCH="copilot/ai-sns-${ITEM_ID}"

          # リモートブランチが既に存在する場合は削除してから再作成
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            echo "既存のリモートブランチ ${BRANCH} を削除します"
            git push origin --delete "$BRANCH" || true
          fi

          git checkout -b "$BRANCH"
          # 空コミット: Copilot が実装変更を追加するまで auto_merge の空PRガードで保護される
          git commit --allow-empty -m "chore: [${ITEM_ID}] 実装PR開始"
          git push origin "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: 実装依頼 PR を作成
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        id: create_pr
        uses: actions/github-script@v9
        with:
          script: |
            const itemId = '${{ steps.select.outputs.item_id }}'
            const title = '${{ steps.select.outputs.item_title }}'
            const category = '${{ steps.select.outputs.item_category }}'
            const priority = '${{ steps.select.outputs.item_priority }}'
            const notes = '${{ steps.select.outputs.item_notes }}'
            const kpiHypothesis = '${{ steps.select.outputs.item_kpi_hypothesis }}'
            const branch = '${{ steps.create_branch.outputs.branch }}'

            // 既存のオープンPRがあるか確認
            const { data: existingPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open'
            })

            if (existingPrs.length > 0) {
              const existing = existingPrs[0]
              console.log(`既存のPRが見つかりました: #${existing.number} ${existing.html_url}`)
              core.setOutput('pr_number', existing.number)
              core.setOutput('pr_url', existing.html_url)
              core.setOutput('pr_existed', 'true')
              return
            }

            const priorityLabel = { high: '★★★ 高', medium: '★★☆ 中', low: '★☆☆ 低' }[priority] || priority

            const body = [
              `## AI SNS 改良計画 実装依頼 [${itemId}]`,
              '',
              `**項目**: ${title}`,
              `**優先度**: ${priorityLabel}`,
              `**カテゴリ**: ${category}`,
              '',
              '### 概要',
              notes,
              '',
              kpiHypothesis ? `### KPI 仮説（Do 後に Check する指標）\n${kpiHypothesis}\n` : '',
              '### 参考ドキュメント',
              '- `docs/ai_sns_improvement_plan.md` — 全体計画書',
              '',
              '### 実装完了後の手順',
              `実装が完了したら以下のいずれかでステータスを done にしてください: ① /admin/dev_initiatives 画面の「done✓」ボタン、② Rails runner で \`TicketLedger.find_ai_sns_plan_by_item_key("${itemId}").update!(status: :completed, due_date: Date.current)\`（mirror 経由なら \`DevInitiative.find_by(item_key: "${itemId}").update!(status: :done)\` でも可）`
            ].join('\n')

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI SNS計画] [${itemId}] ${title}`,
              body,
              head: branch,
              base: 'main',
              draft: true
            })

            console.log(`PR created: #${pr.number} ${pr.html_url}`)
            core.setOutput('pr_number', pr.number)
            core.setOutput('pr_url', pr.html_url)
            core.setOutput('pr_existed', 'false')

      - name: pr_branch を DB に記録
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false'
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          ITEM_ID="${{ steps.select.outputs.item_id }}"
          BRANCH="${{ steps.create_branch.outputs.branch }}"
          cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find_ai_sns_plan_by_item_key('${ITEM_ID}')
            if t
              t.skip_template_guard = true
              t.skip_lane_capacity_guard = true
              t.skip_pr_guardrail = true
              t.skip_stop_guard = true
              t.update!(pr_branch: '${BRANCH}')
            end
          "

      - name: Copilot に実装を依頼（PRコメント）
        # DEPLOY_TOKEN は fine-grained PAT で Issues: Read and Write スコープが必要
        # GITHUB_TOKEN では Copilot coding agent の Webhook がトリガーされないため PAT を使う
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false' && steps.create_pr.outputs.pr_existed != 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.create_pr.outputs.pr_number }}', 10)
            const itemId = '${{ steps.select.outputs.item_id }}'
            const title = '${{ steps.select.outputs.item_title }}'

            const comment = [
              `@copilot \`docs/ai_sns_improvement_plan.md\` の計画書を参照し、既存コードとの整合性を保ちながら **[${itemId}] ${title}** を実装してください。`,
              '',
              `実装完了後は Admin 画面（/admin/dev_initiatives）または以下のコマンドでステータスを done に更新してください:`,
              '```ruby',
              `TicketLedger.find_ai_sns_plan_by_item_key("${itemId}").update!(status: :completed, due_date: Date.current)`,
              '```',
              '',
              '<!-- copilot:model claude-opus-4.6 -->'
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            })

            console.log(`Copilot 実装依頼コメントを PR #${prNumber} に投稿しました`)

      - name: Slack 通知
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'false' && steps.create_pr.outputs.pr_existed != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          ITEM_ID: ${{ steps.select.outputs.item_id }}
          TITLE: ${{ steps.select.outputs.item_title }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          PR_NUM: ${{ steps.create_pr.outputs.pr_number }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL が未設定のためスキップ"
            exit 0
          fi

          PAYLOAD=$(python3 -c "
          import json, os
          item_id = os.environ.get('ITEM_ID', '')
          title = os.environ.get('TITLE', '')
          pr_url = os.environ.get('PR_URL', '')
          pr_num = os.environ.get('PR_NUM', '')
          text = f'🤖 AI SNS計画 次の実装を Copilot に依頼しました\n*[{item_id}]* {title}\nPR #{pr_num}: {pr_url}'
          print(json.dumps({'text': text}))
          ")
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: 全項目完了通知
        if: steps.wip_check.outputs.wip_exceeded == 'false' && steps.select.outputs.skip == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
        run: |
          echo "🎉 AI SNS 改良計画の全項目が完了済みです"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'text': '🎉 AI SNS 改良計画の全項目が完了しました！'}))")
            curl -s -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          fi
