name: Auto Merge on CI Pass

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  # PRが開かれたときに条件を満たせば automerge ラベルを付与する
  add_automerge_label:
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure automerge label exists and conditionally add to PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            // 自動マージ対象ブランチのプレフィックス
            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/'];
            const isAllowedBranch = ALLOWED_PREFIXES.some(p => branch.startsWith(p));
            if (!isAllowedBranch) {
              core.info(`Branch "${branch}" is not in allowed prefixes, skipping automerge label`);
              return;
            }

            // 重要ファイルが変更されている場合は自動マージ対象外
            const PROTECTED_PATTERNS = [
              /^db\/migrate\//,
              /^db\/schema\.rb$/,
              /^Gemfile(\.lock)?$/,
              /^config\/routes\.rb$/,
              /^config\/application\.rb$/,
              /^\.github\/workflows\//,
            ];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const criticalFiles = files.filter(f => PROTECTED_PATTERNS.some(p => p.test(f.filename)));
            if (criticalFiles.length > 0) {
              core.info(`PR #${pr.number} touches protected files, skipping automerge: ${criticalFiles.map(f => f.filename).join(', ')}`);
              return;
            }

            // ラベルが存在しない場合は作成する
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'automerge'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'automerge',
                  color: '0075ca',
                  description: 'Auto-merge when CI passes'
                });
                core.info("Created 'automerge' label");
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automerge']
            });
            core.info(`Added 'automerge' label to PR #${pr.number}`);

  # CI が通ったら automerge ラベル付きの PR を直接マージする
  merge_on_ci_pass:
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS != '' && secrets.SLACK_WEBHOOK_URL_JOBS || secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Merge PR after CI pass
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const headSha = workflowRun.head_sha;
            const headBranch = workflowRun.head_branch;
            const detectedHeadOwner = workflowRun.head_repository?.owner?.login;
            const headOwner = detectedHeadOwner || context.repo.owner;
            if (!detectedHeadOwner) {
              core.info(`head_repository.owner.login is unavailable, falling back to base owner: ${headOwner}`);
            }

            let pr = null;
            const prNumber = workflowRun.pull_requests?.[0]?.number;
            if (prNumber) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              if (data.state === 'open') {
                pr = data;
              }
            } else {
              if (!detectedHeadOwner) {
                core.info('Unable to determine PR head owner from workflow_run payload, skipping');
                return;
              }
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${headOwner}:${headBranch}`
              });
              pr = prs.find(p => p.head.sha === headSha);
            }

            if (!pr) {
              core.info(`No open PR found for this CI run (head: ${headOwner}:${headBranch}, sha: ${headSha})`);
              return;
            }

            if (pr.head.sha !== headSha) {
              core.info(`PR #${pr.number} head sha changed after CI run (expected: ${headSha}, current: ${pr.head.sha}), skipping`);
              return;
            }

            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/'];
            const PROTECTED_PATTERNS = [
              /^db\/migrate\//,
              /^db\/schema\.rb$/,
              /^Gemfile(\.lock)?$/,
              /^config\/routes\.rb$/,
              /^config\/application\.rb$/,
              /^\.github\/workflows\//,
            ];

            const prHeadRepoFullName = pr.head.repo?.full_name;
            if (!prHeadRepoFullName) {
              core.info(`PR #${pr.number}: head repository is unavailable, skipping`);
              return;
            }

            const isSameRepoPr = prHeadRepoFullName === `${context.repo.owner}/${context.repo.repo}`;
            if (!isSameRepoPr) {
              core.info(`PR #${pr.number}: cross-repository PR is not eligible for auto-merge, skipping`);
              return;
            }

            const isAllowedBranch = ALLOWED_PREFIXES.some(p => pr.head.ref.startsWith(p));
            if (!isAllowedBranch) {
              core.info(`PR #${pr.number}: branch "${pr.head.ref}" is not auto-merge eligible, skipping`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const criticalFiles = files.filter(f => PROTECTED_PATTERNS.some(p => p.test(f.filename)));
            if (criticalFiles.length > 0) {
              core.info(`PR #${pr.number} touches protected files, skipping automerge: ${criticalFiles.map(f => f.filename).join(', ')}`);
              return;
            }

            if (pr.draft) {
              try {
                core.info(`PR #${pr.number} is draft, marking ready for review`);
                await github.request('POST /repos/{owner}/{repo}/pulls/{pull_number}/ready_for_review', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                const { data: refreshedPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                pr = refreshedPr;
              } catch (error) {
                const status = error.status ?? error.response?.status ?? 'unknown';
                const errorType = error.name ?? error.constructor?.name ?? typeof error;
                core.info(`Failed to mark PR #${pr.number} ready for review (status: ${status}, type: ${errorType}), skipping: ${error.message}`);
                return;
              }

              if (pr.draft) {
                core.info(`PR #${pr.number} is still draft after ready_for_review call, skipping`);
                return;
              }
            }

            const hasLabel = pr.labels.some(l => l.name === 'automerge');
            if (!hasLabel) {
              core.info(`PR #${pr.number}: automerge label not found, adding automatically`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['automerge']
              });
            }

            core.info(`CI passed for PR #${pr.number}, merging...`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                sha: headSha,
                merge_method: 'merge'
              });
              core.info(`Successfully merged PR #${pr.number}`);

              // マージ成功後、deploy.yml を直接 dispatch してデプロイを開始する
              // （CIのmain再実行を待たずに即デプロイ。CIはすでにPRで通過済み）
              try {
                const reason = `Auto-merged PR #${pr.number}: ${pr.title}`;
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                  inputs: { reason }
                });
                core.info(`Dispatched deploy.yml for PR #${pr.number}: ${pr.title}`);
              } catch (deployDispatchError) {
                core.warning(`Failed to dispatch deploy.yml: ${deployDispatchError.message}`);
              }
            } catch (error) {
              core.error(`Failed to merge PR #${pr.number}: ${error.message}`);
              const webhookUrl = process.env.SLACK_WEBHOOK_URL;
              if (webhookUrl) {
                const payload = JSON.stringify({
                  attachments: [{
                    color: '#e01e5a',
                    text: `:x: *auto_merge 失敗* PR #${pr.number}: ${pr.title}`,
                    fields: [{ title: 'エラー', value: error.message, short: false }],
                    footer: 'GitHub Actions',
                    ts: Math.floor(Date.now() / 1000)
                  }]
                });
                await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload });
              }
              throw error;
            }
