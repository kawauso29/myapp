name: Auto Merge on CI Pass

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - unlabeled
      - review_requested
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # mainブランチのCIは自動マージ不要なのでフィルタリング
    # これにより main push 後の CI 完了でこのワークフローが無駄に起動しなくなる
    branches:
      - 'claude/**'
      - 'copilot/**'
      - 'auto-fix/**'
      - 'deploy-failure/**'
  schedule:
    # copilot/ai-sns-* ブランチの Draft PR を5分毎に自動 undraft して CI 再実行させる
    - cron: '*/5 * * * *'

permissions:
  contents: write
  pull-requests: write
  actions: write
  issues: write

jobs:
  # PRが開かれたときに条件を満たせば automerge ラベルを付与する
  add_automerge_label:
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, sakura-vps]
    steps:
      - name: Ensure automerge label exists and conditionally add to PR
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            // 自動マージ対象ブランチのプレフィックス
            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/', 'deploy-failure/'];
            const isAllowedBranch = ALLOWED_PREFIXES.some(p => branch.startsWith(p));
            if (!isAllowedBranch) {
              core.info(`Branch "${branch}" is not in allowed prefixes, skipping automerge label`);
              return;
            }

            // ラベルが存在しない場合は作成する
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'automerge'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'automerge',
                  color: '0075ca',
                  description: 'Auto-merge when CI passes'
                });
                core.info("Created 'automerge' label");
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automerge']
            });
            core.info(`Added 'automerge' label to PR #${pr.number}`);

  # CI が通ったら automerge ラベル付きの PR を直接マージする
  merge_on_ci_pass:
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          (github.event.workflow_run.event == 'pull_request' ||
           github.event.workflow_run.event == 'push') }}
    runs-on: [self-hosted, sakura-vps]
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS }}
    steps:
      - name: Merge PR after CI pass
        id: merge_pr
        uses: actions/github-script@v9
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const headSha = workflowRun.head_sha;
            const headBranch = workflowRun.head_branch;
            const detectedHeadOwner = workflowRun.head_repository?.owner?.login;
            const headOwner = detectedHeadOwner || context.repo.owner;
            if (!detectedHeadOwner) {
              core.info(`head_repository.owner.login is unavailable, falling back to base owner: ${headOwner}`);
            }

            // mainブランチのCIは自動マージ対象外（ブランチフィルターで通常は来ないが念のため）
            if (headBranch === 'main') {
              core.info('CI ran on main branch, no PR to auto-merge');
              return;
            }

            // PR検索関数（リトライ付き）
            // create_pr.yml がPRをまだ作成中の場合に備えて、待機してリトライする
            async function findPr(lookupAttempt) {
              const prNumber = workflowRun.pull_requests?.[0]?.number;
              if (prNumber) {
                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                if (data.state === 'open') {
                  return data;
                }
              }

              if (!detectedHeadOwner && lookupAttempt === 1) {
                core.info(`head_repository.owner.login is unavailable during PR lookup fallback; trying ${(headOwner ?? 'unknown-owner')}:${(headBranch ?? 'unknown-branch')}`);
              }
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${headOwner}:${headBranch}`
              });
              let found = prs.find(p => p.head.sha === headSha);
              if (!found && prs.length > 0) {
                found = prs[0];
                core.info(`PR #${found.number} found by branch but SHA differs (CI: ${headSha}, PR: ${found.head.sha}). Will verify before merge.`);
              }
              return found || null;
            }

            // PR検索（最大3回リトライ、15秒間隔で待機）
            let pr = null;
            for (let lookupAttempt = 1; lookupAttempt <= 3; lookupAttempt++) {
              pr = await findPr(lookupAttempt);
              if (pr) break;
              if (lookupAttempt < 3) {
                core.info(`No open PR found (attempt ${lookupAttempt}/3), waiting 15s for PR creation...`);
                await new Promise(r => setTimeout(r, 15000));
              }
            }

            if (!pr) {
              core.info(`No open PR found for this CI run after 3 attempts (head: ${headOwner}:${headBranch}, sha: ${headSha})`);
              return;
            }
            core.setOutput('pr_number', String(pr.number));

            if (pr.head.sha !== headSha) {
              core.info(`PR #${pr.number} head sha changed after CI run (expected: ${headSha}, current: ${pr.head.sha}), skipping`);
              return;
            }

            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/', 'deploy-failure/'];
            const prHeadRepoFullName = pr.head.repo?.full_name;
            if (!prHeadRepoFullName) {
              core.info(`PR #${pr.number}: head repository is unavailable, skipping`);
              return;
            }

            const isSameRepoPr = prHeadRepoFullName === `${context.repo.owner}/${context.repo.repo}`;
            if (!isSameRepoPr) {
              core.info(`PR #${pr.number}: cross-repository PR is not eligible for auto-merge, skipping`);
              return;
            }

            const isAllowedBranch = ALLOWED_PREFIXES.some(p => pr.head.ref.startsWith(p));
            if (!isAllowedBranch) {
              core.info(`PR #${pr.number}: branch "${pr.head.ref}" is not auto-merge eligible, skipping`);
              return;
            }

            if (pr.draft) {
              try {
                core.info(`PR #${pr.number} is draft, marking ready for review`);
                await github.graphql(`
                  mutation MarkReady($id: ID!) {
                    markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                      pullRequest { isDraft }
                    }
                  }
                `, { id: pr.node_id });
                const { data: refreshedPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                pr = refreshedPr;
              } catch (error) {
                const status = error.status ?? error.response?.status ?? 'unknown';
                const errorType = error.name ?? error.constructor?.name ?? typeof error;
                core.info(`Failed to mark PR #${pr.number} ready for review (status: ${status}, type: ${errorType}), skipping: ${error.message}`);
                return;
              }

              if (pr.draft) {
                core.info(`PR #${pr.number} is still draft after ready_for_review call, skipping`);
                return;
              }
            }

            const hasHoldLabel = pr.labels.some(l => l.name === 'session-hold');
            if (hasHoldLabel) {
              core.info(`PR #${pr.number}: session-hold label present, skipping auto-merge. Remove the label to enable auto-merge.`);
              return;
            }

            const hasLabel = pr.labels.some(l => l.name === 'automerge');
            if (!hasLabel) {
              core.info(`PR #${pr.number}: automerge label not found, adding automatically`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['automerge']
              });
            }

            // 空PRガード: 変更ファイルが0件のPRはマージしない
            // ai_sns_plan.yml が --allow-empty で空PRを作成し、Copilot実装前にマージされるのを防ぐ
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 1
            });
            if (prFiles.length === 0) {
              core.info(`PR #${pr.number}: no file changes detected, skipping auto-merge (empty PR guard)`);
              core.setOutput('skip_reason', `PR #${pr.number} に変更ファイルがありません（空PR）。Copilot等の実装完了を待ってください。`);
              return;
            }

            // マージ（最大3回試行、失敗後バックオフ: 1回目失敗→5s待機→2回目失敗→10s待機→3回目）
            core.info(`CI passed for PR #${pr.number}, merging...`);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_branch', pr.head.ref);
            let merged = false;
            const MAX_MERGE_ATTEMPTS = 3;
            for (let mergeAttempt = 1; mergeAttempt <= MAX_MERGE_ATTEMPTS; mergeAttempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  sha: headSha,
                  merge_method: 'merge'
                });
                core.info(`Successfully merged PR #${pr.number}`);
                core.setOutput('merged', 'true');
                merged = true;
                break;
              } catch (error) {
                if (mergeAttempt < MAX_MERGE_ATTEMPTS) {
                  const delay = mergeAttempt * 5;
                  core.warning(`Merge attempt ${mergeAttempt}/${MAX_MERGE_ATTEMPTS} failed: ${error.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  core.error(`Failed to merge PR #${pr.number} after ${MAX_MERGE_ATTEMPTS} attempts: ${error.message}`);
                  core.setOutput('merge_error', error.message);
                  const webhookUrl = process.env.SLACK_WEBHOOK_URL;
                  if (webhookUrl) {
                    const payload = JSON.stringify({
                      attachments: [{
                        color: '#e01e5a',
                        text: `:x: *auto_merge 失敗* PR #${pr.number}: ${pr.title}`,
                        fields: [{ title: 'エラー', value: error.message, short: false }],
                        footer: 'GitHub Actions',
                        ts: Math.floor(Date.now() / 1000)
                      }]
                    });
                    await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload });
                  }
                  // マージ失敗は throw せず return して後続のデプロイをスキップする
                  return;
                }
              }
            }

            if (!merged) return;

            // GITHUB_TOKEN によるマージでは push イベントが発火しないため、
            // deploy ワークフローを直接 dispatch する（CI は PR で既に通過済み）
            // 最大3回試行、失敗後バックオフ: 1回目失敗→5s待機→2回目失敗→10s待機→3回目
            for (let deployAttempt = 1; deployAttempt <= 3; deployAttempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                  inputs: {
                    reason: `Auto-deploy after merging PR #${pr.number}: ${pr.title}`
                  }
                });
                core.info(`Dispatched deploy workflow for PR #${pr.number} (attempt ${deployAttempt})`);
                break;
              } catch (deployError) {
                if (deployAttempt < 3) {
                  const delay = deployAttempt * 5;
                  core.warning(`Deploy dispatch attempt ${deployAttempt}/3 failed: ${deployError.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  core.warning(`Failed to dispatch deploy workflow after 3 attempts: ${deployError.message}`);
                  core.setOutput('deploy_dispatch_error', deployError.message);
                }
              }
            }

      # ① 完了フィードバックループ: AI SNS計画のPRがマージされたら DB を自動更新
      - name: Update AI SNS plan status to done
        if: ${{ steps.merge_pr.outputs.merged == 'true' }}
        id: update_plan
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          PR_TITLE="${{ steps.merge_pr.outputs.pr_title }}"
          PR_BRANCH="${{ steps.merge_pr.outputs.pr_branch }}"
          # PRタイトルから [AI SNS計画] [ITEM_ID] パターンを抽出
          ITEM_ID=$(echo "$PR_TITLE" | python3 -c "
          import re, sys
          m = re.search(r'\[AI SNS計画\]\s*\[(\w+)\]', sys.stdin.read())
          print(m.group(1) if m else '')
          " 2>/dev/null || echo "")
          if [ -z "$ITEM_ID" ]; then
            echo "PR title does not match AI SNS plan pattern: ${PR_TITLE}"
            exit 0
          fi
          echo "item_id=${ITEM_ID}" >> "$GITHUB_OUTPUT"
          RESULT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find_ai_sns_plan_by_item_key('${ITEM_ID}')
            unless t
              puts 'not_found'
              exit
            end
            if t.status_completed?
              puts 'already_done'
              exit
            end
            t.skip_template_guard = true
            t.skip_lane_capacity_guard = true
            t.skip_pr_guardrail = true
            t.skip_stop_guard = true
            t.update!(status: :completed, pr_branch: '${PR_BRANCH}'.presence || t.pr_branch)
            puts 'updated'
          " 2>/dev/null || echo "error")
          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"
          if [ "$RESULT" = "updated" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "✅ [${ITEM_ID}] DB ステータスを done に更新しました"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "スキップ: result=${RESULT}"
          fi

      - name: Notify Slack (plan item completed)
        if: ${{ steps.update_plan.outputs.updated == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          ITEM_ID: ${{ steps.update_plan.outputs.item_id }}
          PR_TITLE: ${{ steps.merge_pr.outputs.pr_title }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os
          item_id = os.environ.get("ITEM_ID", "")
          pr_title = os.environ.get("PR_TITLE", "")
          text = f"✅ *AI SNS計画 完了* [{item_id}] {pr_title}\nステータスを自動的に done に更新しました。"
          print(json.dumps({"text": text}))
          ')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      # ② plan-review Issue クローズ: plan-review ラベル付き Issue に紐づく PR マージ後に
      #    open の plan-review ラベル付き Issue を自動クローズしてPDCAサイクルを循環させる。
      #    判定方法: (a) ブランチ名が copilot/ai-sns-plan-review または add-ai-sns-plan を含む、または
      #              (b) PR本文に "Closes/Fixes/Resolves #N" が含まれ #N が plan-review Issue である
      #    Copilot が自由なブランチ名を使った場合でも (b) で補足できる。
      #    Issue クローズはWebhookトリガーを必要としないため GITHUB_TOKEN で問題なし。
      - name: Close plan-review Issues after plan review PR merge
        if: ${{ steps.merge_pr.outputs.merged == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prBranch = '${{ steps.merge_pr.outputs.pr_branch }}';
            const prNumber = parseInt('${{ steps.merge_pr.outputs.pr_number }}', 10);

            // (a) ブランチ名チェック: copilot/ai-sns-plan-review または add-ai-sns-plan を含む
            const isBranchMatch = prBranch.startsWith('copilot/ai-sns-plan-review') ||
                                  prBranch.includes('add-ai-sns-plan');

            // (b) PR本文の closing キーワードチェック
            let isBodyMatch = false;
            if (!isBranchMatch && prNumber) {
              try {
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                const body = pr.body || '';
                // "Closes/Fixes/Resolves #N" パターンを検索
                const closingRefs = [...body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)]
                  .map(m => parseInt(m[1], 10));
                if (closingRefs.length > 0) {
                  // 参照先 Issue が plan-review ラベルを持つか確認
                  for (const refNum of closingRefs) {
                    try {
                      const { data: refIssue } = await github.rest.issues.get({ owner, repo, issue_number: refNum });
                      if (refIssue.labels.some(l => l.name === 'plan-review') && refIssue.state === 'open') {
                        isBodyMatch = true;
                        break;
                      }
                    } catch (_) { /* issue not found, skip */ }
                  }
                }
              } catch (e) {
                core.warning(`Failed to fetch PR body for closing keyword check: ${e.message}`);
              }
            }

            if (!isBranchMatch && !isBodyMatch) {
              core.info(`PR branch "${prBranch}" is not a plan-review PR; skipping issue close`);
              return;
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'plan-review',
              state: 'open',
              per_page: 20
            });

            if (issues.length === 0) {
              core.info('No open plan-review issues to close');
              return;
            }

            for (const issue of issues) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed'
              });
              core.info(`Closed plan-review issue #${issue.number} after plan review PR merge`);
            }
            core.info(`Closed ${issues.length} plan-review issue(s)`);

      # ③ ledger improvement/operations Issue クローズ:
      #    copilot/ledger-{N} または copilot/copilotledger-{N} ブランチの PR がマージされたとき、
      #    GitHub Issue 本文の `| ticket_id | N |` を手がかりに対応 Issue を自動クローズする。
      #    あわせてチケットの status を completed に更新する。
      - name: Close ledger improvement Issues after PR merge
        if: ${{ steps.merge_pr.outputs.merged == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prBranch = '${{ steps.merge_pr.outputs.pr_branch }}';

            // copilot/ledger-{N} または copilot/copilotledger-{N} パターンを検出
            const branchMatch = prBranch.match(/copilot\/(?:copilot)?ledger-(\d+)/i);
            if (!branchMatch) {
              core.info(`Branch "${prBranch}" does not match ledger-{N} pattern; skipping improvement issue close`);
              return;
            }
            const ticketId = parseInt(branchMatch[1], 10);
            core.info(`Detected ticket_id ${ticketId} from branch "${prBranch}"`);

            // 全 open Issues を取得し ticket_id が一致するものを探す
            const { data: allOpenIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              per_page: 100
            });

            const ticketPattern = new RegExp(`\\|\\s*ticket_id\\s*\\|\\s*${ticketId}\\s*\\|`);
            const issuesToClose = allOpenIssues.filter(i =>
              i.pull_request == null &&
              ticketPattern.test(i.body || '')
            );

            if (issuesToClose.length === 0) {
              core.info(`No open issues found for ticket_id ${ticketId}`);
              return;
            }

            for (const issue of issuesToClose) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed'
              });
              core.info(`Closed issue #${issue.number} for ticket_id ${ticketId}`);
            }
            core.info(`Closed ${issuesToClose.length} issue(s) for ticket_id ${ticketId}`);

      - name: Update ticket status to completed after ledger PR merge
        if: ${{ steps.merge_pr.outputs.merged == 'true' }}
        env:
          PR_BRANCH: ${{ steps.merge_pr.outputs.pr_branch }}
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          TICKET_ID=$(echo "$PR_BRANCH" | python3 -c "
          import re, sys
          m = re.search(r'copilot/(?:copilot)?ledger-(\d+)', sys.stdin.read(), re.IGNORECASE)
          print(m.group(1) if m else '')
          " 2>/dev/null || echo "")
          if [ -z "$TICKET_ID" ]; then
            echo "Branch does not match ledger-{N} pattern; skipping ticket status update"
            exit 0
          fi
          # 数値のみであることを明示的に確認（念のため）
          if ! echo "$TICKET_ID" | grep -Eq '^[0-9]+$'; then
            echo "TICKET_ID is not numeric; skipping"
            exit 0
          fi
          RESULT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find(${TICKET_ID}) rescue nil
            unless t
              puts 'not_found'
              exit
            end
            if t.status_completed? || t.status_cancelled?
              puts 'already_done'
              exit
            end
            t.skip_template_guard = true
            t.skip_lane_capacity_guard = true
            t.skip_pr_guardrail = true
            t.skip_stop_guard = true
            t.update!(status: :completed, pr_branch: '${PR_BRANCH}'.presence || t.pr_branch)
            puts 'updated'
          " 2>&1 || echo "error")
          echo "Ticket #${TICKET_ID} status update: ${RESULT}"

      - name: Notify Slack (skipped due to protected files)
        if: ${{ steps.merge_pr.outcome == 'success' && steps.merge_pr.outputs.skip_reason != '' }}
        env:
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.merge_pr.outputs.pr_number }}
          PR_NUMBER: ${{ steps.merge_pr.outputs.pr_number }}
          REASON: ${{ steps.merge_pr.outputs.skip_reason }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          reason = os.environ.get("REASON", "")
          pr_url = os.environ.get("PR_URL", "")
          print(json.dumps({"attachments": [{"color": "#f0a500", "text": ":warning: *CI通過後も自動マージをスキップしました*", "fields": [{"title": "PR", "value": f"#{pr_number}", "short": True}, {"title": "理由", "value": reason, "short": False}, {"title": "対応", "value": f"手動でマージするか、保護ファイルの変更が意図的か確認してください: {pr_url}", "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      - name: Notify Slack (deploy dispatch failed after auto-merge)
        if: ${{ steps.merge_pr.outcome == 'success' && steps.merge_pr.outputs.deploy_dispatch_error != '' }}
        env:
          DEPLOY_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy.yml
          PR_NUMBER: ${{ steps.merge_pr.outputs.pr_number }}
          ERROR_MSG: ${{ steps.merge_pr.outputs.deploy_dispatch_error }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          error = os.environ.get("ERROR_MSG", "")
          deploy_url = os.environ.get("DEPLOY_WORKFLOW_URL", "")
          print(json.dumps({"attachments": [{"color": "#f0a500", "text": ":warning: *自動マージ後のデプロイ起動に失敗*", "fields": [{"title": "PR", "value": f"#{pr_number}", "short": True}, {"title": "原因", "value": error, "short": False}, {"title": "次のアクション", "value": f"deploy.yml を手動実行してください: {deploy_url}", "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      - name: Notify Slack (merge failed)
        if: ${{ steps.merge_pr.outcome == 'success' && steps.merge_pr.outputs.merge_error != '' }}
        env:
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.merge_pr.outputs.pr_number }}
          PR_NUMBER: ${{ steps.merge_pr.outputs.pr_number }}
          ERROR_MSG: ${{ steps.merge_pr.outputs.merge_error }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          error = os.environ.get("ERROR_MSG", "")
          pr_url = os.environ.get("PR_URL", "")
          print(json.dumps({"attachments": [{"color": "#e01e5a", "text": ":x: *自動マージに失敗しました*", "fields": [{"title": "PR", "value": f"#{pr_number}", "short": True}, {"title": "エラー", "value": error, "short": False}, {"title": "次のアクション", "value": f"PRを確認して手動マージしてください: {pr_url}", "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

  # CI が success 以外で完了した場合（failure / cancelled を含む）に通知する
  # workflow_run の branches フィルターにより main ブランチは対象外
  # cancelled は concurrency group によるキャンセル（push CI が PR CI に置き換えられた）など
  # push/pull_request 両方のCI非成功を通知対象にする
  notify_automerge_skip_reason:
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success' &&
          (github.event.workflow_run.event == 'pull_request' ||
           github.event.workflow_run.event == 'push') }}
    runs-on: [self-hosted, sakura-vps]
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS }}
    steps:
      - name: Notify Slack (auto merge skipped)
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          branch = os.environ.get("HEAD_BRANCH", "")
          conclusion = os.environ.get("RUN_CONCLUSION", "")
          run_url = os.environ.get("RUN_URL", "")
          print(json.dumps({"attachments": [{"color": "#f0a500", "text": ":warning: *自動マージをスキップしました*", "fields": [{"title": "ブランチ", "value": branch, "short": True}, {"title": "原因", "value": f"CI の結果が `{conclusion}` のため自動マージ条件を満たしていません", "short": False}, {"title": "CIログ", "value": run_url, "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

  # session-hold ラベルが外れたとき、または ready_for_review に変換されたとき、CI通過済みなら即マージする
  merge_on_hold_release:
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          (
            (github.event.action == 'unlabeled' && github.event.label.name == 'session-hold') ||
            github.event.action == 'ready_for_review'
          ) &&
          !github.event.pull_request.draft &&
          github.event.pull_request.state == 'open' &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, sakura-vps]
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS }}
    steps:
      - name: Merge PR if CI already passed
        id: merge_on_release
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;
            const headBranch = pr.head.ref;

            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/', 'deploy-failure/'];
            if (!ALLOWED_PREFIXES.some(p => headBranch.startsWith(p))) {
              core.info(`Branch "${headBranch}" is not auto-merge eligible, skipping`);
              return;
            }

            // CI が既に通過しているか確認（ci.yml の最新ランを検索）
            const { data: runsData } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: headSha,
              per_page: 5
            });

            const successRun = (runsData.workflow_runs || []).find(r => r.conclusion === 'success');
            if (!successRun) {
              core.info(`No successful CI run for SHA ${headSha}. Auto-merge will proceed when CI next passes.`);
              return;
            }

            core.info(`CI already passed (run #${successRun.id}). Proceeding to merge PR #${pr.number}...`);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_branch', pr.head?.ref || '');

            // マージ（最大3回試行）
            let merged = false;
            for (let mergeAttempt = 1; mergeAttempt <= 3; mergeAttempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  sha: headSha,
                  merge_method: 'merge'
                });
                core.info(`Successfully merged PR #${pr.number}`);
                core.setOutput('merged', 'true');
                merged = true;
                break;
              } catch (error) {
                if (mergeAttempt < 3) {
                  const delay = mergeAttempt * 5;
                  core.warning(`Merge attempt ${mergeAttempt}/3 failed: ${error.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  core.error(`Failed to merge PR #${pr.number} after 3 attempts: ${error.message}`);
                  core.setOutput('merge_error', error.message);
                  return;
                }
              }
            }

            if (!merged) return;

            // デプロイ dispatch（最大3回試行）
            for (let deployAttempt = 1; deployAttempt <= 3; deployAttempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                  inputs: {
                    reason: `Auto-deploy after merging PR #${pr.number} (session-hold released): ${pr.title}`
                  }
                });
                core.info(`Dispatched deploy workflow for PR #${pr.number}`);
                break;
              } catch (deployError) {
                if (deployAttempt < 3) {
                  await new Promise(r => setTimeout(r, deployAttempt * 5000));
                } else {
                  core.warning(`Failed to dispatch deploy after 3 attempts: ${deployError.message}`);
                  core.setOutput('deploy_dispatch_error', deployError.message);
                }
              }
            }

      # ① 完了フィードバックループ: AI SNS計画のPRがマージされたら DB を自動更新
      - name: Update AI SNS plan status to done (hold release)
        if: ${{ steps.merge_on_release.outputs.merged == 'true' }}
        id: update_plan_hold
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          PR_TITLE="${{ steps.merge_on_release.outputs.pr_title }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          ITEM_ID=$(echo "$PR_TITLE" | python3 -c "
          import re, sys
          m = re.search(r'\[AI SNS計画\]\s*\[(\w+)\]', sys.stdin.read())
          print(m.group(1) if m else '')
          " 2>/dev/null || echo "")
          if [ -z "$ITEM_ID" ]; then
            echo "PR title does not match AI SNS plan pattern: ${PR_TITLE}"
            exit 0
          fi
          echo "item_id=${ITEM_ID}" >> "$GITHUB_OUTPUT"
          RESULT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find_ai_sns_plan_by_item_key('${ITEM_ID}')
            unless t
              puts 'not_found'
              exit
            end
            if t.status_completed?
              puts 'already_done'
              exit
            end
            t.skip_template_guard = true
            t.skip_lane_capacity_guard = true
            t.skip_pr_guardrail = true
            t.skip_stop_guard = true
            t.update!(status: :completed, pr_branch: '${PR_BRANCH}'.presence || t.pr_branch)
            puts 'updated'
          " 2>/dev/null || echo "error")
          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"
          if [ "$RESULT" = "updated" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "✅ [${ITEM_ID}] DB ステータスを done に更新しました"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "スキップ: result=${RESULT}"
          fi

      - name: Notify Slack (plan item completed - hold release)
        if: ${{ steps.update_plan_hold.outputs.updated == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          ITEM_ID: ${{ steps.update_plan_hold.outputs.item_id }}
          PR_TITLE: ${{ steps.merge_on_release.outputs.pr_title }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os
          item_id = os.environ.get("ITEM_ID", "")
          pr_title = os.environ.get("PR_TITLE", "")
          text = f"✅ *AI SNS計画 完了* [{item_id}] {pr_title}\nステータスを自動的に done に更新しました。"
          print(json.dumps({"text": text}))
          ')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      # ③ ledger improvement/operations Issue クローズ:
      #    copilot/ledger-{N} または copilot/copilotledger-{N} ブランチの PR がマージされたとき、
      #    GitHub Issue 本文の `| ticket_id | N |` を手がかりに対応 Issue を自動クローズする。
      - name: Close ledger improvement Issues after PR merge (hold release)
        if: ${{ steps.merge_on_release.outputs.merged == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prBranch = '${{ steps.merge_on_release.outputs.pr_branch }}';

            // copilot/ledger-{N} または copilot/copilotledger-{N} パターンを検出
            const branchMatch = prBranch.match(/copilot\/(?:copilot)?ledger-(\d+)/i);
            if (!branchMatch) {
              core.info(`Branch "${prBranch}" does not match ledger-{N} pattern; skipping improvement issue close`);
              return;
            }
            const ticketId = parseInt(branchMatch[1], 10);
            core.info(`Detected ticket_id ${ticketId} from branch "${prBranch}"`);

            const { data: allOpenIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              per_page: 100
            });

            const ticketPattern = new RegExp(`\\|\\s*ticket_id\\s*\\|\\s*${ticketId}\\s*\\|`);
            const issuesToClose = allOpenIssues.filter(i =>
              i.pull_request == null &&
              ticketPattern.test(i.body || '')
            );

            if (issuesToClose.length === 0) {
              core.info(`No open issues found for ticket_id ${ticketId}`);
              return;
            }

            for (const issue of issuesToClose) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed'
              });
              core.info(`Closed issue #${issue.number} for ticket_id ${ticketId}`);
            }
            core.info(`Closed ${issuesToClose.length} issue(s) for ticket_id ${ticketId}`);

      - name: Update ticket status to completed after ledger PR merge (hold release)
        if: ${{ steps.merge_on_release.outputs.merged == 'true' }}
        env:
          PR_BRANCH: ${{ steps.merge_on_release.outputs.pr_branch }}
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          TICKET_ID=$(echo "$PR_BRANCH" | python3 -c "
          import re, sys
          m = re.search(r'copilot/(?:copilot)?ledger-(\d+)', sys.stdin.read(), re.IGNORECASE)
          print(m.group(1) if m else '')
          " 2>/dev/null || echo "")
          if [ -z "$TICKET_ID" ]; then
            echo "Branch does not match ledger-{N} pattern; skipping ticket status update"
            exit 0
          fi
          if ! echo "$TICKET_ID" | grep -Eq '^[0-9]+$'; then
            echo "TICKET_ID is not numeric; skipping"
            exit 0
          fi
          RESULT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find(${TICKET_ID}) rescue nil
            unless t
              puts 'not_found'
              exit
            end
            if t.status_completed? || t.status_cancelled?
              puts 'already_done'
              exit
            end
            t.skip_template_guard = true
            t.skip_lane_capacity_guard = true
            t.skip_pr_guardrail = true
            t.skip_stop_guard = true
            t.update!(status: :completed, pr_branch: '${PR_BRANCH}'.presence || t.pr_branch)
            puts 'updated'
          " 2>&1 || echo "error")
          echo "Ticket #${TICKET_ID} status update: ${RESULT}"

      - name: Notify Slack (merge failed after hold release)
        if: ${{ steps.merge_on_release.outputs.merge_error != '' }}
        env:
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.merge_on_release.outputs.pr_number }}
          PR_NUMBER: ${{ steps.merge_on_release.outputs.pr_number }}
          ERROR_MSG: ${{ steps.merge_on_release.outputs.merge_error }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          error = os.environ.get("ERROR_MSG", "")
          pr_url = os.environ.get("PR_URL", "")
          print(json.dumps({"attachments": [{"color": "#e01e5a", "text": ":x: *session-hold解除後の自動マージに失敗*", "fields": [{"title": "PR", "value": f"#{pr_number}", "short": True}, {"title": "エラー", "value": error, "short": False}, {"title": "次のアクション", "value": f"PRを確認して手動マージしてください: {pr_url}", "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

  # レビュー依頼が来たとき、CI が既に通過済みなら即マージする
  merge_on_review_requested:
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          github.event.action == 'review_requested' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.state == 'open' &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, sakura-vps]
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS }}
    steps:
      - name: Merge PR if CI already passed (review_requested escalation)
        id: merge_on_review
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;
            const headBranch = pr.head.ref;

            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/', 'deploy-failure/'];
            if (!ALLOWED_PREFIXES.some(p => headBranch.startsWith(p))) {
              core.info(`Branch "${headBranch}" is not auto-merge eligible, skipping`);
              return;
            }

            const hasHoldLabel = pr.labels.some(l => l.name === 'session-hold');
            if (hasHoldLabel) {
              core.info(`PR #${pr.number}: session-hold label present, skipping`);
              return;
            }

            // CI が既に通過しているか確認（ci.yml の最新ランを検索）
            const { data: runsData } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: headSha,
              per_page: 5
            });

            const successRun = (runsData.workflow_runs || []).find(r => r.conclusion === 'success');
            if (!successRun) {
              core.info(`No successful CI run for SHA ${headSha}. Auto-merge will proceed when CI next passes.`);
              return;
            }

            core.info(`CI already passed (run #${successRun.id}). Merging PR #${pr.number} (review_requested escalation)...`);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_branch', pr.head.ref);

            // マージ（最大3回試行）
            let merged = false;
            for (let mergeAttempt = 1; mergeAttempt <= 3; mergeAttempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  sha: headSha,
                  merge_method: 'merge'
                });
                core.info(`Successfully merged PR #${pr.number}`);
                core.setOutput('merged', 'true');
                merged = true;
                break;
              } catch (error) {
                if (mergeAttempt < 3) {
                  const delay = mergeAttempt * 5;
                  core.warning(`Merge attempt ${mergeAttempt}/3 failed: ${error.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  core.error(`Failed to merge PR #${pr.number} after 3 attempts: ${error.message}`);
                  core.setOutput('merge_error', error.message);
                  return;
                }
              }
            }

            if (!merged) return;

            // デプロイ dispatch（最大3回試行）
            for (let deployAttempt = 1; deployAttempt <= 3; deployAttempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                  inputs: {
                    reason: `Auto-deploy after merging PR #${pr.number} (review_requested, CI passed): ${pr.title}`
                  }
                });
                core.info(`Dispatched deploy workflow for PR #${pr.number}`);
                break;
              } catch (deployError) {
                if (deployAttempt < 3) {
                  await new Promise(r => setTimeout(r, deployAttempt * 5000));
                } else {
                  core.warning(`Failed to dispatch deploy: ${deployError.message}`);
                  core.setOutput('deploy_dispatch_error', deployError.message);
                }
              }
            }

      # ③ ledger improvement Issue クローズ (review_requested 経由マージ時)
      - name: Close ledger improvement Issues after PR merge (review_requested)
        if: ${{ steps.merge_on_review.outputs.merged == 'true' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prBranch = '${{ steps.merge_on_review.outputs.pr_branch }}';

            const branchMatch = prBranch.match(/copilot\/(?:copilot)?ledger-(\d+)/i);
            if (!branchMatch) {
              core.info(`Branch "${prBranch}" does not match ledger-{N} pattern; skipping improvement issue close`);
              return;
            }
            const ticketId = parseInt(branchMatch[1], 10);
            core.info(`Detected ticket_id ${ticketId} from branch "${prBranch}"`);

            const { data: allOpenIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              per_page: 100
            });

            const ticketPattern = new RegExp(`\\|\\s*ticket_id\\s*\\|\\s*${ticketId}\\s*\\|`);
            const issuesToClose = allOpenIssues.filter(i =>
              i.pull_request == null &&
              ticketPattern.test(i.body || '')
            );

            if (issuesToClose.length === 0) {
              core.info(`No open issues found for ticket_id ${ticketId}`);
              return;
            }

            for (const issue of issuesToClose) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: issue.number,
                state: 'closed'
              });
              core.info(`Closed issue #${issue.number} for ticket_id ${ticketId}`);
            }
            core.info(`Closed ${issuesToClose.length} issue(s) for ticket_id ${ticketId}`);

      - name: Update ticket status to completed after ledger PR merge (review_requested)
        if: ${{ steps.merge_on_review.outputs.merged == 'true' }}
        env:
          PR_BRANCH: ${{ steps.merge_on_review.outputs.pr_branch }}
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          TICKET_ID=$(echo "$PR_BRANCH" | python3 -c "
          import re, sys
          m = re.search(r'copilot/(?:copilot)?ledger-(\d+)', sys.stdin.read(), re.IGNORECASE)
          print(m.group(1) if m else '')
          " 2>/dev/null || echo "")
          if [ -z "$TICKET_ID" ]; then
            echo "Branch does not match ledger-{N} pattern; skipping ticket status update"
            exit 0
          fi
          if ! echo "$TICKET_ID" | grep -Eq '^[0-9]+$'; then
            echo "TICKET_ID is not numeric; skipping"
            exit 0
          fi
          RESULT=$(cd ~/myapp && RAILS_ENV=production bin/rails runner "
            t = TicketLedger.find(${TICKET_ID}) rescue nil
            unless t
              puts 'not_found'
              exit
            end
            if t.status_completed? || t.status_cancelled?
              puts 'already_done'
              exit
            end
            t.skip_template_guard = true
            t.skip_lane_capacity_guard = true
            t.skip_pr_guardrail = true
            t.skip_stop_guard = true
            t.update!(status: :completed, pr_branch: '${PR_BRANCH}'.presence || t.pr_branch)
            puts 'updated'
          " 2>&1 || echo "error")
          echo "Ticket #${TICKET_ID} status update: ${RESULT}"

      - name: Notify Slack (merged on review_requested)
        if: ${{ steps.merge_on_review.outputs.merged == 'true' }}
        env:
          PR_NUMBER: ${{ steps.merge_on_review.outputs.pr_number }}
          PR_TITLE: ${{ steps.merge_on_review.outputs.pr_title }}
          PR_BRANCH: ${{ steps.merge_on_review.outputs.pr_branch }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then exit 0; fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then exit 0; fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_title = os.environ.get("PR_TITLE", "")
          pr_branch = os.environ.get("PR_BRANCH", "")
          print(json.dumps({"attachments": [{"color": "#2eb886", "text": f":white_check_mark: *自動マージ完了（レビュー依頼 \u2192 CI済みのため即マージ）* PR #{pr_number}", "fields": [{"title": "タイトル", "value": pr_title, "short": False}, {"title": "ブランチ", "value": pr_branch, "short": True}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" -H "Content-Type: application/json" -d "${PAYLOAD}"

      - name: Notify Slack (merge failed on review_requested)
        if: ${{ steps.merge_on_review.outputs.merge_error != '' }}
        env:
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.merge_on_review.outputs.pr_number }}
          PR_NUMBER: ${{ steps.merge_on_review.outputs.pr_number }}
          ERROR_MSG: ${{ steps.merge_on_review.outputs.merge_error }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then exit 0; fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then exit 0; fi
          PAYLOAD=$(python3 -c '
          import json, os, time
          pr_number = os.environ.get("PR_NUMBER", "")
          error = os.environ.get("ERROR_MSG", "")
          pr_url = os.environ.get("PR_URL", "")
          print(json.dumps({"attachments": [{"color": "#e01e5a", "text": f":x: *\u30ec\u30d3\u30e5\u30fc\u4f9d\u983c\u6642\u306e\u81ea\u52d5\u30de\u30fc\u30b8\u306b\u5931\u6557* PR #{pr_number}", "fields": [{"title": "\u30a8\u30e9\u30fc", "value": error, "short": False}, {"title": "\u6b21\u306e\u30a2\u30af\u30b7\u30e7\u30f3", "value": f"PR\u3092\u78ba\u8a8d\u3057\u3066\u624b\u52d5\u30de\u30fc\u30b8\u3057\u3066\u304f\u3060\u3055\u3044: {pr_url}", "short": False}], "footer": "GitHub Actions Auto Merge", "ts": int(time.time())}]}))
          ')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" -H "Content-Type: application/json" -d "${PAYLOAD}"

  # スケジュール実行: copilot/ai-sns-* ブランチの Draft PR を自動 undraft する
  # undraft されると pull_request_target:ready_for_review イベントが発火し、
  # merge_on_hold_release が CI 通過済みを確認して自動マージする
  undraft_ai_sns_prs:
    if: github.event_name == 'schedule'
    runs-on: [self-hosted, sakura-vps]
    steps:
      - name: Undraft open AI SNS PRs
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            const ALLOWED_PREFIXES = ['claude/', 'copilot/', 'auto-fix/', 'deploy-failure/'];
            const targets = prs.filter(pr =>
              pr.draft &&
              ALLOWED_PREFIXES.some(p => pr.head.ref.startsWith(p))
            );

            if (targets.length === 0) {
              core.info('No draft PRs found for auto-undraft');
              return;
            }

            for (const pr of targets) {
              core.info(`Undrafting PR #${pr.number}: ${pr.title} (${pr.head.ref})`);
              try {
                await github.graphql(`
                  mutation MarkReady($id: ID!) {
                    markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                      pullRequest { isDraft }
                    }
                  }
                `, { id: pr.node_id });
                core.info(`PR #${pr.number} undrafted successfully`);
              } catch (error) {
                core.warning(`Failed to undraft PR #${pr.number}: ${error.message}`);
              }
            }
