name: Enable Auto Merge

on:
  pull_request_target:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable_auto_merge:
    if: ${{ !github.event.pull_request.draft && contains(github.event.pull_request.labels.*.name, 'automerge') }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for labeled PR
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id

            try {
              await github.graphql(
                `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId }
              )
              core.info(`Auto-merge enabled for PR #${context.payload.pull_request.number}`)
            } catch (error) {
              const message = String(error?.message || "")
              if (message.includes("Pull request is in clean status")) {
                core.info("Auto-merge is already enabled.")
                return
              }
              throw error
            }
