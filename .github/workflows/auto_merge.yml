name: Auto Merge on CI Pass

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  # PRが開かれたときに automerge ラベルを付与する
  add_automerge_label:
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure automerge label exists and add to PR
        uses: actions/github-script@v7
        with:
          script: |
            // ラベルが存在しない場合は作成する
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'automerge'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'automerge',
                  color: '0075ca',
                  description: 'Auto-merge when CI passes'
                });
                core.info("Created 'automerge' label");
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['automerge']
            });
            core.info(`Added 'automerge' label to PR #${context.payload.pull_request.number}`);

  # CI が通ったら automerge ラベル付きの PR を直接マージする
  merge_on_ci_pass:
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Merge PR after CI pass
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const headSha = workflowRun.head_sha;
            const headBranch = workflowRun.head_branch;
            const headOwner = workflowRun.head_repository?.owner?.login || context.repo.owner;

            let pr = null;
            const prNumber = workflowRun.pull_requests?.[0]?.number;
            if (prNumber) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              if (data.state === 'open') {
                pr = data;
              }
            } else {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${headOwner}:${headBranch}`
              });
              pr = prs.find(p => p.head.ref === headBranch);
            }

            if (!pr) {
              core.info(`No open PR found for this CI run (head: ${headOwner}:${headBranch}, sha: ${headSha})`);
              return;
            }

            if (pr.head.sha !== headSha) {
              core.info(`PR #${pr.number} head sha changed after CI run (expected: ${headSha}, current: ${pr.head.sha}), skipping`);
              return;
            }

            if (pr.draft) {
              core.info(`PR #${pr.number} is draft, skipping`);
              return;
            }

            const hasLabel = pr.labels.some(l => l.name === 'automerge');
            if (!hasLabel) {
              const isSameRepoPr = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
              if (!isSameRepoPr) {
                core.info(`PR #${pr.number}: automerge label not found on non-repo branch, skipping`);
                return;
              }
              core.info(`PR #${pr.number}: automerge label not found, adding automatically`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['automerge']
              });
            }

            core.info(`CI passed for PR #${pr.number}, merging...`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                sha: headSha,
                merge_method: 'merge'
              });
              core.info(`Successfully merged PR #${pr.number}`);
            } catch (error) {
              core.error(`Failed to merge PR #${pr.number}: ${error.message}`);
              const webhookUrl = process.env.SLACK_WEBHOOK_URL;
              if (webhookUrl) {
                const payload = JSON.stringify({
                  attachments: [{
                    color: '#e01e5a',
                    text: `:x: *auto_merge 失敗* PR #${pr.number}: ${pr.title}`,
                    fields: [{ title: 'エラー', value: error.message, short: false }],
                    footer: 'GitHub Actions',
                    ts: Math.floor(Date.now() / 1000)
                  }]
                });
                await fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload });
              }
              throw error;
            }
