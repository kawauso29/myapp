name: Auto Create PR on CI Pass

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  create_pr_on_ci_pass:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          (startsWith(github.event.workflow_run.head_branch, 'claude/') ||
           startsWith(github.event.workflow_run.head_branch, 'copilot/') ||
           startsWith(github.event.workflow_run.head_branch, 'auto-fix/')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request if missing
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const headBranch = workflowRun.head_branch;
            const headSha = workflowRun.head_sha;
            const headOwner = workflowRun.head_repository?.owner?.login || context.repo.owner;

            const { data: openPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${headOwner}:${headBranch}`,
              base: 'main',
              per_page: 100
            });

            if (openPrs.length > 0) {
              core.info(`Open PR already exists for ${headOwner}:${headBranch} (PR #${openPrs[0].number})`);
              return;
            }

            const commitTitle = workflowRun.head_commit?.message?.split('\n')[0] || `Session update: ${headBranch}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${workflowRun.id}`;
            const body = [
              '## Summary',
              'Automated PR creation after CI success for an agent session branch.',
              '',
              '## Context',
              `- Branch: \`${headBranch}\``,
              `- Head SHA: \`${headSha}\``,
              `- CI Run: ${runUrl}`,
              '',
              '## Notes',
              '- This PR was auto-created after a successful push CI run.'
            ].join('\n');

            try {
              const { data: created } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: commitTitle,
                head: headBranch,
                base: 'main',
                body
              });
              core.info(`Created PR #${created.number} for branch ${headBranch}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Skipping PR creation for ${headBranch}: ${error.message}`);
                return;
              }
              throw error;
            }

  notify_pr_skip_reason:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          (startsWith(github.event.workflow_run.head_branch, 'claude/') ||
           startsWith(github.event.workflow_run.head_branch, 'copilot/') ||
           startsWith(github.event.workflow_run.head_branch, 'auto-fix/')) }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS != '' && secrets.SLACK_WEBHOOK_URL_JOBS || secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Notify Slack (auto PR skipped)
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg branch "${HEAD_BRANCH}" \
            --arg conclusion "${RUN_CONCLUSION}" \
            --arg run_url "${RUN_URL}" \
            '{attachments:[{color:"#f0a500",text:":warning: *自動PR作成をスキップしました*",fields:[{title:"ブランチ",value:$branch,short:true},{title:"原因",value:("CI結果が `" + $conclusion + "` のため自動PR作成は実行されません"),short:false},{title:"CIログ",value:$run_url,short:false}],footer:"GitHub Actions Auto Create PR",ts:now|floor}]}')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
