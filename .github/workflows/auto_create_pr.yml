name: Auto Create PR on CI Pass

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create_pr_on_ci_pass:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          (startsWith(github.event.workflow_run.head_branch, 'claude/') ||
           startsWith(github.event.workflow_run.head_branch, 'copilot/') ||
           startsWith(github.event.workflow_run.head_branch, 'auto-fix/')) }}
    runs-on: [self-hosted, sakura-vps]
    steps:
      - name: Create pull request if missing
        uses: actions/github-script@v9
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const headBranch = workflowRun.head_branch;
            const headSha = workflowRun.head_sha;
            const headOwner = workflowRun.head_repository?.owner?.login || context.repo.owner;

            const { data: openPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${headOwner}:${headBranch}`,
              base: 'main',
              per_page: 100
            });

            if (openPrs.length > 0) {
              core.info(`Open PR already exists for ${headOwner}:${headBranch} (PR #${openPrs[0].number})`);
              return;
            }

            const commitTitle = workflowRun.head_commit?.message?.split('\n')[0] || `Session update: ${headBranch}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${workflowRun.id}`;
            const body = [
              '## Summary',
              'Automated PR creation after CI success for an agent session branch.',
              '',
              '## Context',
              `- Branch: \`${headBranch}\``,
              `- Head SHA: \`${headSha}\``,
              `- CI Run: ${runUrl}`,
              '',
              '## Notes',
              '- This PR was auto-created after a successful push CI run.'
            ].join('\n');

            try {
              const { data: created } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: commitTitle,
                head: headBranch,
                base: 'main',
                body
              });
              core.info(`Created PR #${created.number} for branch ${headBranch}`);
              // session-hold ラベルを付与（会話中の自動マージを防止）
              try {
                try {
                  await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'session-hold' });
                } catch (labelGetError) {
                  if (labelGetError.status === 404) {
                    await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'session-hold', color: 'e4e669', description: 'Conversation in progress - holds auto-merge until removed' });
                  } else {
                    core.warning(`Could not check session-hold label existence (status: ${labelGetError.status}): ${labelGetError.message}`);
                  }
                }
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: created.number, labels: ['session-hold'] });
                core.info(`Added session-hold label to PR #${created.number}`);
              } catch (holdLabelError) {
                core.warning(`Failed to add session-hold label to PR #${created.number}: ${holdLabelError.message}`);
              }
            } catch (error) {
              if (error.status === 422) {
                core.info(`Skipping PR creation for ${headBranch}: ${error.message}`);
                return;
              }
              throw error;
            }

  # CI失敗時の通知（cancelled は concurrency group によるキャンセルなので通知しない）
  notify_pr_skip_reason:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          (startsWith(github.event.workflow_run.head_branch, 'claude/') ||
           startsWith(github.event.workflow_run.head_branch, 'copilot/') ||
           startsWith(github.event.workflow_run.head_branch, 'auto-fix/')) }}
    runs-on: [self-hosted, sakura-vps]
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS }}
    steps:
      - name: Notify Slack (auto PR skipped)
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL is not set; skipping notification"
            exit 0
          fi
          if ! printf '%s' "${SLACK_WEBHOOK_URL}" | grep -Eq '^https?://'; then
            echo "SLACK_WEBHOOK_URL format is invalid; skipping notification"
            exit 0
          fi
          PAYLOAD=$(python3 -c "
          import json, os, time
          branch = os.environ.get('HEAD_BRANCH', '')
          conclusion = os.environ.get('RUN_CONCLUSION', '')
          run_url = os.environ.get('RUN_URL', '')
          print(json.dumps({'attachments': [{'color': '#f0a500', 'text': ':warning: *自動PR作成をスキップしました*', 'fields': [{'title': 'ブランチ', 'value': branch, 'short': True}, {'title': '原因', 'value': f'CI結果が \`{conclusion}\` のため自動PR作成は実行されません', 'short': False}, {'title': 'CIログ', 'value': run_url, 'short': False}], 'footer': 'GitHub Actions Auto Create PR', 'ts': int(time.time())}]}))
          ")
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
