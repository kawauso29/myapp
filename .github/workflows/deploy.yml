name: Deploy to Sakura VPS

on:
  push:
    branches: [main]

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Expo web
        run: cd frontend && npx expo export --platform web

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build_frontend
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Copy frontend to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend-dist/"
          target: "/tmp/frontend-dist"
          strip_components: 1

      - name: Deploy Rails + install frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/myapp
            git fetch origin main
            git reset --hard origin/main
            eval "$(rbenv init -)"
            bundle install
            RAILS_ENV=production bin/rails db:migrate
            RAILS_ENV=production bin/rails runner "ActiveRecord::Tasks::DatabaseTasks.prepare_all"
            RAILS_ENV=production bin/rails assets:precompile
            # Deploy frontend static files
            rm -rf ~/myapp/public/app
            mkdir -p ~/myapp/public/app
            cp -r /tmp/frontend-dist/* ~/myapp/public/app/
            rm -rf /tmp/frontend-dist
            # Update Nginx config
            sudo cp ~/myapp/config/nginx/myapp.conf /etc/nginx/sites-available/myapp
            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl restart puma
