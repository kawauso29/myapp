name: Deploy to Sakura VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/myapp
            git fetch origin main
            git reset --hard origin/main

            # Ruby / Rails
            eval "$(rbenv init -)"
            bundle install
            RAILS_ENV=production bin/rails db:migrate
            RAILS_ENV=production bin/rails runner "ActiveRecord::Tasks::DatabaseTasks.prepare_all"
            RAILS_ENV=production bin/rails assets:precompile

            # Frontend (Node.js required on VPS)
            if command -v node > /dev/null 2>&1; then
              echo "Building frontend with Node $(node -v)"
              cd ~/myapp/frontend
              npm ci
              npx expo export --platform web
              rm -rf ~/myapp/public/app
              mkdir -p ~/myapp/public/app
              cp -r ~/myapp/frontend/dist/* ~/myapp/public/app/
              echo "Frontend deployed to public/app/"
            else
              echo "Node.js not found - skipping frontend build"
            fi

            sudo systemctl restart puma
