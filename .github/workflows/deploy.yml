name: Deploy to Sakura VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deploy reason (auto-filled by auto_merge or enter manually)'
        required: false
        default: 'Manual deploy'

# 同時デプロイを防ぐ
# cancel-in-progress: false にすることで実行中のデプロイをキャンセルせずキューに入れる
# （キャンセルするとPuma停止後にrestart前でデプロイが中断されVPSが停止状態になる危険がある）
# 新しいデプロイがキューに入ると、既にキュー待ちのデプロイは自動的にキャンセルされ最新のみが残る
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build_frontend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: build-frontend-${{ github.sha }}
      cancel-in-progress: true
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Expo web
        run: cd frontend && npx expo export --platform web

      - name: Create tarball
        run: tar czf frontend.tar.gz -C frontend/dist .

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: frontend-tar
          path: frontend.tar.gz

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: build_frontend
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      COMMIT_MSG: ${{ github.event.inputs.reason || github.event.workflow_run.head_commit.message || 'Auto-deploy from CI' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: frontend-tar

      - name: Notify Slack (deploy start)
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${COMMIT_MSG}" \
            --arg actor "${{ github.actor }}" \
            '{attachments:[{color:"#36c5f0",text:":rocket: *デプロイ開始* `main` by \($actor)",fields:[{title:"コミット",value:$msg,short:false}],footer:"GitHub Actions",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_CI != '' && secrets.SLACK_WEBHOOK_URL_CI || secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      - name: Copy tarball to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend.tar.gz"
          target: "/tmp/"

      - name: Sync Slack env vars to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set_env() {
              KEY=$1; VAL=$2; FILE=~/myapp/.env
              touch $FILE
              if grep -q "^${KEY}=" $FILE; then
                sed -i "s|^${KEY}=.*|${KEY}=${VAL}|" $FILE
              else
                echo "${KEY}=${VAL}" >> $FILE
              fi
            }
            set_env SLACK_SIGNING_SECRET '${{ secrets.SLACK_SIGNING_SECRET }}'
            set_env SLACK_BOT_TOKEN '${{ secrets.SLACK_BOT_TOKEN }}'
            set_env SLACK_WEBHOOK_URL '${{ secrets.SLACK_WEBHOOK_URL }}'
            set_env SLACK_WEBHOOK_URL_ERROR '${{ secrets.SLACK_WEBHOOK_URL_ERROR != '' && secrets.SLACK_WEBHOOK_URL_ERROR || secrets.SLACK_WEBHOOK_URL }}'
            set_env SLACK_ERROR_CHANNEL_ID '${{ secrets.SLACK_ERROR_CHANNEL_ID }}'
            set_env DEPLOY_TOKEN '${{ secrets.DEPLOY_TOKEN }}'
            set_env SOLID_QUEUE_IN_PUMA '1'

      - name: Deploy Rails + frontend
        id: deploy_rails
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
            cd ~/myapp
            # ロールバック用に現在の SHA を保存（run_id でファイル名を一意にする）
            git rev-parse HEAD > /tmp/pre_deploy_sha_${{ github.run_id }}
            git fetch origin main
            git reset --hard origin/main
            bundle install
            RAILS_ENV=production bin/rails db:migrate
            RAILS_ENV=production bin/rails runner "ActiveRecord::Tasks::DatabaseTasks.prepare_all"
            RAILS_ENV=production bin/rails assets:precompile
            rm -rf ~/myapp/public/app
            mkdir -p ~/myapp/public/app
            tar xzf /tmp/frontend.tar.gz -C ~/myapp/public/app/
            rm /tmp/frontend.tar.gz
            echo "Frontend files:"
            ls ~/myapp/public/app/ | head -10
            sudo cp ~/myapp/config/nginx/myapp.conf /etc/nginx/sites-available/myapp && sudo nginx -t && sudo systemctl reload nginx || echo "Nginx update skipped (check sudoers)"
            rm -rf tmp/cache && mkdir -p tmp/cache
            LEGACY_JOB_PIDS=$(ps -eo pid=,comm=,args= | awk '$2 != "bash" && $2 != "sh" && $0 ~ /(^|[[:space:]])(bundle[[:space:]]+exec[[:space:]]+)?([^[:space:]]*\/)?bin\/jobs([[:space:]]|$)/ { print $1 }')
            if [ -n "$LEGACY_JOB_PIDS" ]; then
              echo "Stopping legacy bin/jobs processes: $LEGACY_JOB_PIDS"
              for pid in $LEGACY_JOB_PIDS; do
                if [ "$pid" = "$$" ] || [ "$pid" = "$PPID" ]; then
                  continue
                fi
                kill "$pid" || true
                sleep 2
                kill -0 "$pid" 2>/dev/null && kill -9 "$pid" || true
              done
            fi
            # Pre-restart cleanup: discard stale failures from previous deploys
            RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
            # Ensure sockets directory exists
            mkdir -p ~/myapp/tmp/sockets
            # Restart Puma (also restarts SolidQueue since SOLID_QUEUE_IN_PUMA=1)
            sudo systemctl restart puma
            # Wait for puma socket to appear (up to 30s)
            for i in $(seq 1 30); do
              if [ -S ~/myapp/tmp/sockets/puma.sock ]; then
                echo "Puma socket ready after ${i}s"
                break
              fi
              sleep 1
            done
            if [ ! -S ~/myapp/tmp/sockets/puma.sock ]; then
              echo "ERROR: puma.sock not found after 30s - puma may have failed to start"
              sudo systemctl status puma --no-pager || true
              exit 1
            fi
            echo "Puma status:"
            sudo systemctl is-active puma || true
            RAILS_ENV=production bin/rails runner "Rails.application.eager_load!"
            RAILS_ENV=production bin/rails solid_queue:verify_required_job_constants
            # Post-restart cleanup: discard any transient UnknownJobClassError failures
            # that appeared during SolidQueue startup (recurring tasks may fire immediately)
            RAILS_ENV=production bin/rails solid_queue:cleanup_stale_monitor_failed_jobs
            RAILS_ENV=production bin/rails solid_queue:cleanup_unknown_job_classes
            RAILS_ENV=production bin/rails solid_queue:cleanup_stale_recurring_unknown_class_jobs
            RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions

      - name: Health check after deploy
        id: health_check
        if: steps.deploy_rails.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            for i in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost/up 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i, status=$STATUS)"
                exit 0
              fi
              echo "Health check failed (attempt $i, status=$STATUS), retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 3 attempts"
            exit 1

      - name: Rollback on failure
        if: failure() && (steps.deploy_rails.outcome == 'failure' || steps.health_check.outcome == 'failure')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
            cd ~/myapp
            PRE_SHA=$(cat /tmp/pre_deploy_sha_${{ github.run_id }} 2>/dev/null || echo "")
            if [ -z "$PRE_SHA" ]; then
              echo "No pre-deploy SHA found, skipping rollback"
              exit 1
            fi
            echo "Rolling back to $PRE_SHA ..."
            git reset --hard "$PRE_SHA"
            bundle install
            RAILS_ENV=production bin/rails db:migrate
            rm -rf tmp/cache && mkdir -p tmp/cache
            LEGACY_JOB_PIDS=$(ps -eo pid=,comm=,args= | awk '$2 != "bash" && $2 != "sh" && $0 ~ /(^|[[:space:]])(bundle[[:space:]]+exec[[:space:]]+)?([^[:space:]]*\/)?bin\/jobs([[:space:]]|$)/ { print $1 }')
            if [ -n "$LEGACY_JOB_PIDS" ]; then
              echo "Stopping legacy bin/jobs processes during rollback: $LEGACY_JOB_PIDS"
              for pid in $LEGACY_JOB_PIDS; do
                if [ "$pid" = "$$" ] || [ "$pid" = "$PPID" ]; then
                  continue
                fi
                kill "$pid" || true
                sleep 2
                kill -0 "$pid" 2>/dev/null && kill -9 "$pid" || true
              done
            fi
            RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
            sudo systemctl restart puma
            sleep 10
            RAILS_ENV=production bin/rails runner "Rails.application.eager_load!"
            RAILS_ENV=production bin/rails solid_queue:verify_required_job_constants
            RAILS_ENV=production bin/rails solid_queue:cleanup_stale_monitor_failed_jobs
            RAILS_ENV=production bin/rails solid_queue:cleanup_unknown_job_classes
            RAILS_ENV=production bin/rails solid_queue:cleanup_stale_recurring_unknown_class_jobs
            RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
            echo "Rollback to $PRE_SHA complete"

      - name: Notify Slack (deploy success)
        if: success()
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${COMMIT_MSG}" \
            --arg actor "${{ github.actor }}" \
            '{attachments:[{color:"#2eb886",text:":white_check_mark: *デプロイ成功* `main` by \($actor)",fields:[{title:"コミット",value:$msg,short:false},{title:"サーバー",value:"133.167.124.112",short:true}],footer:"GitHub Actions",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_CI != '' && secrets.SLACK_WEBHOOK_URL_CI || secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

      # カテゴリ②: デプロイ失敗通知
      - name: Notify Slack (deploy failure)
        if: failure()
        run: |
          if [ "${{ steps.deploy_rails.outcome }}" = "failure" ]; then
            ROLLBACK_STATUS="デプロイ中に失敗"
          else
            ROLLBACK_STATUS="ヘルスチェック失敗（ロールバック実行）"
          fi
          PAYLOAD=$(jq -n \
            --arg msg "${COMMIT_MSG}" \
            --arg status "${ROLLBACK_STATUS}" \
            --arg actor "${{ github.actor }}" \
            --arg log_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{attachments:[{color:"#e01e5a",text:":x: *デプロイ失敗* `main` by \($actor)",fields:[{title:"コミット",value:$msg,short:false},{title:"原因",value:$status,short:false},{title:"次のアクション",value:"ログを確認してください: \($log_url)",short:false}],footer:"GitHub Actions",ts:now|floor}]}')
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL_ERROR != '' && secrets.SLACK_WEBHOOK_URL_ERROR || secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
