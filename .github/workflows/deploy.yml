name: Deploy to Sakura VPS

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deploy reason (auto-filled by CI dispatch or enter manually)'
        required: false
        default: 'Manual deploy'

# 同時デプロイを防ぐ
# cancel-in-progress: false にすることで実行中のデプロイをキャンセルせずキューに入れる
# （キャンセルするとPuma停止後にrestart前でデプロイが中断されVPSが停止状態になる危険がある）
# 新しいデプロイがキューに入ると、既にキュー待ちのデプロイは自動的にキャンセルされ最新のみが残る
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, sakura-vps]
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      COMMIT_MSG: ${{ github.event.inputs.reason || 'Auto-deploy from CI' }}
    steps:
      - uses: actions/checkout@v4

      - name: Notify Slack (deploy start)
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD=$(python3 -c "import json, os, time; msg = os.environ.get('COMMIT_MSG', ''); actor = os.environ.get('ACTOR', ''); print(json.dumps({'attachments':[{'color':'#36c5f0','text':':rocket: *デプロイ開始* \`main\` by ' + actor,'fields':[{'title':'コミット','value':msg,'short':False}],'footer':'GitHub Actions','ts':int(time.time())}]}))")
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi

      - name: Sync env vars from GitHub Secrets to VPS
        run: |
          set_env() {
            KEY=$1; VAL=$2; FILE=~/myapp/.env
            touch $FILE
            if grep -q "^${KEY}=" $FILE; then
              sed -i "s|^${KEY}=.*|${KEY}=${VAL}|" $FILE
            else
              echo "${KEY}=${VAL}" >> $FILE
            fi
          }
          set_env SLACK_SIGNING_SECRET '${{ secrets.SLACK_SIGNING_SECRET }}'
          set_env SLACK_BOT_TOKEN '${{ secrets.SLACK_BOT_TOKEN }}'
          set_env SLACK_WEBHOOK_URL '${{ secrets.SLACK_WEBHOOK_URL }}'
          set_env SLACK_WEBHOOK_URL_ERROR '${{ secrets.SLACK_WEBHOOK_URL_ERROR }}'
          set_env SLACK_WEBHOOK_URL_JOBS '${{ secrets.SLACK_WEBHOOK_URL_JOBS }}'

          set_env DEPLOY_TOKEN '${{ secrets.DEPLOY_TOKEN }}'

          # Remove unused env vars
          for KEY in SLACK_ERROR_CHANNEL_ID SLACK_CLAUDE_CHANNEL_ID SLACK_CLAUDE_MEMBER_ID GITHUB_DEPLOY_TOKEN; do
            sed -i "/^${KEY}=/d" ~/myapp/.env
          done

      - name: Mirror production env to workspace
        # workspace 上の Rails task でも本番と同じ env を読むため、deploy ごとに意図的に置き換える。
        run: ln -sf ~/myapp/.env "$GITHUB_WORKSPACE/.env"

      - name: Setup runner environment (OOM prevention)
        # CodeQL (Java) は Copilot coding agent が parallel_validation 実行時に起動する。
        # 1.9GB VPS では制限なしだと ~1.4GB を消費しランナーごと OOM キルされる（2026-04-26実績）。
        # JAVA_TOOL_OPTIONS でヒープ上限を 600m に制限し OOM 再発を防止する。
        # 注: runner .env は runsvc.sh 起動時に読み込まれ全ジョブの環境変数として伝播する。
        # sudoers 設定（要手動・一度だけ実行）:
        #   echo 'ubuntu ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart actions.runner.kawauso29-myapp.os3-392-29108.service, /usr/bin/systemctl reset-failed actions.runner.kawauso29-myapp.os3-392-29108.service, /bin/systemctl restart actions.runner.kawauso29-myapp.os3-392-29108.service, /bin/systemctl reset-failed actions.runner.kawauso29-myapp.os3-392-29108.service' | sudo tee /etc/sudoers.d/github-runner-health && sudo chmod 440 /etc/sudoers.d/github-runner-health
        run: |
          RUNNER_ENV_FILE="$HOME/actions-runner/.env"
          touch "$RUNNER_ENV_FILE"
          # JAVA_TOOL_OPTIONS: JVM ヒープ上限（CodeQL等のJavaプロセス全体に適用）
          if grep -q "^JAVA_TOOL_OPTIONS=" "$RUNNER_ENV_FILE"; then
            sed -i "s|^JAVA_TOOL_OPTIONS=.*|JAVA_TOOL_OPTIONS=-Xmx600m|" "$RUNNER_ENV_FILE"
          else
            echo "JAVA_TOOL_OPTIONS=-Xmx600m" >> "$RUNNER_ENV_FILE"
          fi
          echo "✅ runner .env に JAVA_TOOL_OPTIONS=-Xmx600m を設定しました"
          echo "⚠️  sudoers NOPASSWD 未設定の場合、check_runner_health によるランナー自動再起動が機能しません"
          echo "   手動で一度: sudo tee /etc/sudoers.d/github-runner-health に設定してください（deploy.yml のコメント参照）"
          # sudoers が設定済みかチェック（設定済みなら ✅ 表示）
          if sudo -n systemctl status actions.runner.kawauso29-myapp.os3-392-29108.service > /dev/null 2>&1 || \
             ls /etc/sudoers.d/github-runner-health > /dev/null 2>&1; then
            echo "✅ sudoers NOPASSWD 設定済みです"
          else
            echo "⚠️  sudoers NOPASSWD 未設定: runner 停止時の自動再起動が機能しません"
          fi

      - name: Setup VPS cron jobs (監視)
        # runner ヘルスチェックを5分おきに実行し、停止時は Slack 通知
        # SolidQueue 死活監視を5分おきに実行し、scheduler 停止時は Slack 通知
        run: |
          if [ -f ~/myapp/bin/check_runner_health ]; then
            chmod +x ~/myapp/bin/check_runner_health
          else
            echo "check_runner_health not found; skipping"
          fi
          if [ -f ~/myapp/bin/check_solid_queue_alive ]; then
            chmod +x ~/myapp/bin/check_solid_queue_alive
          else
            echo "check_solid_queue_alive not found; skipping"
          fi
          # 既存のエントリを削除してから追加（重複防止 / 旧 dispatch_weekly_pdca も削除）
          (crontab -l 2>/dev/null | grep -Ev "dispatch_weekly_pdca|check_runner_health|check_solid_queue_alive") | crontab - || true
          if [ -f ~/myapp/bin/check_runner_health ]; then
            (crontab -l 2>/dev/null; echo "*/5 * * * * \$HOME/myapp/bin/check_runner_health >> /tmp/runner_health.log 2>&1") | crontab -
          fi
          if [ -f ~/myapp/bin/check_solid_queue_alive ]; then
            (crontab -l 2>/dev/null; echo "*/5 * * * * \$HOME/myapp/bin/check_solid_queue_alive >> /tmp/solid_queue_alive.log 2>&1") | crontab -
          fi
          echo "✅ VPS cron 設定完了:"
          crontab -l | grep -E "check_runner_health|check_solid_queue_alive" || true

      - name: Deploy Rails + frontend
        id: deploy_rails
        run: |
          set -e
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          cd ~/myapp
          # ロールバック用に現在の SHA を保存（run_id でファイル名を一意にする）
          git rev-parse HEAD > /tmp/pre_deploy_sha_${{ github.run_id }}
          git fetch origin main
          git reset --hard origin/main
          bundle install
          RAILS_ENV=production bin/rails db:migrate
          RAILS_ENV=production bin/rails runner "ActiveRecord::Tasks::DatabaseTasks.prepare_all"
          RAILS_ENV=production bin/rails assets:precompile
          sudo cp ~/myapp/config/nginx/myapp.conf /etc/nginx/sites-available/myapp && sudo nginx -t && sudo systemctl reload nginx || echo "Nginx update skipped (check sudoers)"
          rm -rf tmp/cache && mkdir -p tmp/cache
          # Kill standalone SolidQueue processes (bin/jobs or SolidQueue::Cli).
          # SolidQueue should only run inside Puma via the plugin (SOLID_QUEUE_IN_PUMA=1).
          # Standalone processes use fork mode and cause ActiveJob::UnknownJobClassError.
          STANDALONE_SQ_PIDS=$(ps -eo pid=,comm=,args= | awk '$2 != "bash" && $2 != "sh" && ($0 ~ /(^|[[:space:]])(bundle[[:space:]]+exec[[:space:]]+)?([^[:space:]]*\/)?bin\/jobs([[:space:]]|$)/ || $0 ~ /solid_queue/) { print $1 }')
          if [ -n "$STANDALONE_SQ_PIDS" ]; then
            echo "Stopping standalone SolidQueue processes: $STANDALONE_SQ_PIDS"
            for pid in $STANDALONE_SQ_PIDS; do
              if [ "$pid" = "$$" ] || [ "$pid" = "$PPID" ]; then
                continue
              fi
              kill "$pid" || true
              sleep 2
              kill -0 "$pid" 2>/dev/null && kill -9 "$pid" || true
            done
          fi
          # Pre-restart cleanup: discard stale failures from previous deploys
          RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
          # Ensure sockets directory exists
          mkdir -p ~/myapp/tmp/sockets
          # Restart Puma (also restarts SolidQueue since SOLID_QUEUE_IN_PUMA=1)
          sudo systemctl restart puma
          # Wait for Puma to actually accept HTTP connections (up to 60s)
          # NOTE: checking socket file existence is not enough - Puma creates the socket
          # when it binds, but may not accept connections until after booting.
          echo "Waiting for Puma to accept HTTP connections..."
          PUMA_READY=0
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost/up 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Puma ready after ${i}s (status=$STATUS)"
              PUMA_READY=1
              break
            fi
            sleep 1
          done
          if [ "$PUMA_READY" != "1" ]; then
            echo "ERROR: Puma did not become ready after 60s"
            sudo systemctl status puma --no-pager || true
            journalctl -u puma --no-pager -n 50 || true
            exit 1
          fi
          RAILS_ENV=production bin/rails runner "Rails.application.eager_load!"
          RAILS_ENV=production bin/rails solid_queue:verify_required_job_constants
          # Post-restart cleanup: discard any transient UnknownJobClassError failures
          # that appeared during SolidQueue startup (recurring tasks may fire immediately)
          RAILS_ENV=production bin/rails solid_queue:cleanup_stale_monitor_failed_jobs
          RAILS_ENV=production bin/rails solid_queue:cleanup_unknown_job_classes
          RAILS_ENV=production bin/rails solid_queue:cleanup_stale_recurring_unknown_class_jobs
          RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
          # Final delayed cleanup: catch any failures created during post-restart processing
          echo "Waiting 10s for any remaining transient failures to settle..."
          sleep 10
          RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
          # Diagnose SolidQueue health and report to Slack jobs channel.
          # If scheduler is down or zero jobs in last 24h, the rake task posts to error channel.
          RAILS_ENV=production SLACK=1 bin/rails solid_queue:diagnose || true

      - name: Health check after deploy
        id: health_check
        if: steps.deploy_rails.outcome == 'success'
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost/up 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i, status=$STATUS)"
              exit 0
            fi
            echo "Health check failed (attempt $i, status=$STATUS), retrying in 10s..."
            if [ "$i" = "5" ]; then
              echo "=== Puma status ==="
              sudo systemctl status puma --no-pager || true
              echo "=== Puma journal (last 30 lines) ==="
              journalctl -u puma --no-pager -n 30 || true
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        id: rollback
        if: failure() && (steps.deploy_rails.outcome == 'failure' || steps.health_check.outcome == 'failure')
        run: |
          set -e
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          cd ~/myapp
          PRE_SHA=$(cat /tmp/pre_deploy_sha_${{ github.run_id }} 2>/dev/null || echo "")
          if [ -z "$PRE_SHA" ]; then
            echo "No pre-deploy SHA found, skipping rollback"
            exit 1
          fi
          echo "Rolling back to $PRE_SHA ..."
          git reset --hard "$PRE_SHA"
          bundle install
          RAILS_ENV=production bin/rails db:migrate
          rm -rf tmp/cache && mkdir -p tmp/cache
          STANDALONE_SQ_PIDS=$(ps -eo pid=,comm=,args= | awk '$2 != "bash" && $2 != "sh" && ($0 ~ /(^|[[:space:]])(bundle[[:space:]]+exec[[:space:]]+)?([^[:space:]]*\/)?bin\/jobs([[:space:]]|$)/ || $0 ~ /solid_queue/) { print $1 }')
          if [ -n "$STANDALONE_SQ_PIDS" ]; then
            echo "Stopping standalone SolidQueue processes during rollback: $STANDALONE_SQ_PIDS"
            for pid in $STANDALONE_SQ_PIDS; do
              if [ "$pid" = "$$" ] || [ "$pid" = "$PPID" ]; then
                continue
              fi
              kill "$pid" || true
              sleep 2
              kill -0 "$pid" 2>/dev/null && kill -9 "$pid" || true
            done
          fi
          RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
          sudo systemctl restart puma
          # Wait for Puma to accept HTTP connections (up to 60s)
          echo "Waiting for Puma to accept HTTP connections after rollback..."
          PUMA_READY=0
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost/up 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Puma ready after ${i}s (status=$STATUS)"
              PUMA_READY=1
              break
            fi
            sleep 1
          done
          if [ "$PUMA_READY" != "1" ]; then
            echo "WARNING: Puma did not respond after 60s rollback wait"
            sudo systemctl status puma --no-pager || true
            journalctl -u puma --no-pager -n 30 || true
          fi
          RAILS_ENV=production bin/rails runner "Rails.application.eager_load!"
          RAILS_ENV=production bin/rails solid_queue:verify_required_job_constants
          RAILS_ENV=production bin/rails solid_queue:cleanup_stale_monitor_failed_jobs
          RAILS_ENV=production bin/rails solid_queue:cleanup_unknown_job_classes
          RAILS_ENV=production bin/rails solid_queue:cleanup_stale_recurring_unknown_class_jobs
          RAILS_ENV=production bin/rails solid_queue:discard_unknown_class_failed_executions
          echo "Rollback to $PRE_SHA complete"

      - name: Notify Slack (deploy success)
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_CI }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD=$(python3 -c "import json, os, time; msg = os.environ.get('COMMIT_MSG', ''); actor = os.environ.get('ACTOR', ''); print(json.dumps({'attachments':[{'color':'#2eb886','text':':white_check_mark: *デプロイ成功* \`main\` by ' + actor,'fields':[{'title':'コミット','value':msg,'short':False},{'title':'サーバー','value':'133.167.124.112','short':True}],'footer':'GitHub Actions','ts':int(time.time())}]}))")
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi

      # カテゴリ②: デプロイ失敗通知
      - name: Notify Slack (deploy failure)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_ERROR }}
          ACTOR: ${{ github.actor }}
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${{ steps.deploy_rails.outcome }}" = "failure" ]; then
            ROLLBACK_STATUS="デプロイ中に失敗"
          else
            ROLLBACK_STATUS="ヘルスチェック失敗（ロールバック実行）"
          fi
          export ROLLBACK_STATUS
          PAYLOAD=$(python3 -c "import json, os, time; msg = os.environ.get('COMMIT_MSG', ''); actor = os.environ.get('ACTOR', ''); status = os.environ.get('ROLLBACK_STATUS', ''); log_url = os.environ.get('LOG_URL', ''); print(json.dumps({'attachments':[{'color':'#e01e5a','text':':x: *デプロイ失敗* \`main\` by ' + actor,'fields':[{'title':'コミット','value':msg,'short':False},{'title':'原因','value':status,'short':False},{'title':'次のアクション','value':'ログを確認してください: ' + log_url,'short':False}],'footer':'GitHub Actions','ts':int(time.time())}]}))")
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
