name: DB Snapshot for Claude

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run DB snapshot on VPS
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          cd ~/myapp
          RAILS_ENV=production bin/rails db:snapshot 2>/dev/null > $GITHUB_WORKSPACE/db_snapshot.json

      - name: Commit to db-snapshots branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git ls-remote --exit-code --heads origin db-snapshots > /dev/null 2>&1; then
            git fetch origin db-snapshots
            git checkout -B db-snapshots FETCH_HEAD
          else
            git checkout --orphan db-snapshots
            git rm -rf . --quiet 2>/dev/null || true
          fi
          git add db_snapshot.json
          git diff --staged --quiet || git commit -m "snapshot: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin db-snapshots
