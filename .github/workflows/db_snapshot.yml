name: DB Snapshot for Copilot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"  # 毎朝6時JST

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: [self-hosted, sakura-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run DB snapshot on VPS
        run: |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          cd ~/myapp
          RAILS_ENV=production bin/rails db:snapshot 2>/dev/null > $GITHUB_WORKSPACE/db/snapshots/db_snapshot.json

      - name: Commit snapshot to main
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config --local commit.gpgSign false
          git config --local tag.gpgSign false
          git add db/snapshots/db_snapshot.json
          git diff --staged --quiet || git commit -m "snapshot: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
