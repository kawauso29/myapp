name: Auto Create PR

on:
  push:
    branches:
      - 'claude/**'
      - 'copilot/**'
      - 'auto-fix/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if not exists
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // 既存のオープンPRを確認
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`
            });

            if (prs.length > 0) {
              core.info(`PR already exists: #${prs[0].number} — skipping`);
              return;
            }

            const commitMessage = context.payload.head_commit?.message || branch;
            const title = commitMessage.split('\n')[0];

            // リトライ付きPR作成（3回、指数バックオフ）
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                const { data: pr } = await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: `ブランチ \`${branch}\` からの自動PR作成\n\nCI通過後に自動マージされます。`,
                  head: branch,
                  base: 'main',
                  draft: false
                });
                core.info(`Created PR #${pr.number}: ${pr.html_url}`);
                // session-hold ラベルを付与（会話中の自動マージを防止）
                // ただし自動進行ブランチ（ai_sns_plan.yml 等）はCI通過で即マージさせるため除外
                const AUTO_PROGRESS_PATTERNS = [/^copilot\/ai-sns-/, /^auto-fix\//];
                const isAutoProgress = AUTO_PROGRESS_PATTERNS.some(p => p.test(branch));
                if (isAutoProgress) {
                  core.info(`Branch "${branch}" is auto-progress branch, skipping session-hold label`);
                } else {
                  try {
                    try {
                      await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'session-hold' });
                    } catch (labelGetError) {
                      if (labelGetError.status === 404) {
                        await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'session-hold', color: 'e4e669', description: 'Conversation in progress - holds auto-merge until removed' });
                      } else {
                        core.warning(`Could not check session-hold label existence (status: ${labelGetError.status}): ${labelGetError.message}`);
                      }
                    }
                    await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: ['session-hold'] });
                    core.info(`Added session-hold label to PR #${pr.number}`);
                  } catch (holdLabelError) {
                    core.warning(`Failed to add session-hold label to PR #${pr.number}: ${holdLabelError.message}`);
                  }
                }
                return;
              } catch (error) {
                if (error.status === 422) {
                  core.info(`PR creation returned 422 (may already exist): ${error.message}`);
                  return;
                }
                if (attempt < 3) {
                  const delay = attempt * 3;
                  core.warning(`PR creation attempt ${attempt}/3 failed: ${error.message}, retrying in ${delay}s...`);
                  await new Promise(r => setTimeout(r, delay * 1000));
                } else {
                  core.error(`PR creation failed after 3 attempts: ${error.message}`);
                  throw error;
                }
              }
            }
