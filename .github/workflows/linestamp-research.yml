name: Linestamp Research

on:
  workflow_dispatch:
    inputs:
      focus:
        description: "今週の調査フォーカス(空でも可)"
        required: false
        default: ""
#  schedule:
#    - cron: '0 0 * * 1' # 月曜 0:00 UTC = 月曜 9:00 JST
#
jobs:
  create-research-issue:
    runs-on: [self-hosted, sakura-vps]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      - name: Compute ISO week
        id: week
        run: |
          WEEK=$(TZ=Asia/Tokyo date +"%Y-W%V")
          printf 'iso_week=%s\n' "$WEEK" >> "$GITHUB_OUTPUT"

      - name: Create research issue and assign Copilot
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          FOCUS_INPUT: ${{ inputs.focus }}
          ISO_WEEK: ${{ steps.week.outputs.iso_week }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "DEPLOY_TOKEN is required"
            exit 1
          fi

          WEEK="$ISO_WEEK"
          FOCUS="$FOCUS_INPUT"
          if [ -z "$FOCUS" ]; then
            FOCUS="今週注目のLINEスタンプトレンド・季節要素・感情ニーズ"
          fi
          TIMESTAMP=$(TZ=UTC date +"%Y-%m-%d-%H%M%S")

          BODY=$(cat <<EOF
          ## ミッション
          LINEスタンプ企画のための週次調査を1つの Ruby seed ファイルとして作成してください。

          ## 出力ファイル
          \`db/seeds/linestamp/imports/pending/${TIMESTAMP}_research_${WEEK}.rb\`

          ## 仕様
          - \`db/seeds/linestamp/imports/_templates/research_template.rb\` を雛形にする
          - \`Linestamp::Importer.run(seed_id: "${TIMESTAMP}_research_${WEEK}")\` ブロック内で \`upsert_research!\` を呼ぶ
          - マスタ slug は事前に確認(\`bin/rails runner 'puts Linestamp::CommunicationTheme.pluck(:slug,:name)'\` 等)
          - 未知 slug はエラーになる
          - \`docs/linestamp/08_PLANNING_GUIDE.md\` を必読

          ## 調査フォーカス
          ${FOCUS}

          ## 完了条件
          - [ ] ruby -c で構文エラーなし
          - [ ] 未知マスタ slug を使っていない
          - [ ] findings / brand_ideas / line_market_insights が充実
          - [ ] communication_themes と attributes が適切に設定済み
          - [ ] PR がレビュー待ち
          EOF
          )

          export ISSUE_TITLE="[linestamp/research] ${WEEK} 週次調査"
          export ISSUE_BODY="$BODY"
          export ISSUE_LABELS="linestamp,research,auto"

          python3 - <<'PY' > /tmp/linestamp-research-issue.json
          import json
          import os

          print(json.dumps({
              "title": os.environ["ISSUE_TITLE"],
              "body": os.environ["ISSUE_BODY"],
              "labels": os.environ["ISSUE_LABELS"].split(","),
          }))
          PY

          ISSUE_RESPONSE=$(curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d @/tmp/linestamp-research-issue.json)
          ISSUE_NUMBER=$(python3 -c 'import json, sys; print(json.load(sys.stdin)["number"])' <<<"$ISSUE_RESPONSE")
          ISSUE_URL=$(python3 -c 'import json, sys; print(json.load(sys.stdin)["html_url"])' <<<"$ISSUE_RESPONSE")
          echo "Created: $ISSUE_URL"

          COMMENT_BODY="@copilot このIssueに従って週次調査 seed ファイルを作成し、copilot/linestamp-research-${WEEK} ブランチでPRを作成してください。最初に docs/linestamp/08_PLANNING_GUIDE.md を読んでください。"
          export COMMENT_BODY
          COMMENT_PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"body": os.environ["COMMENT_BODY"]}))')
          curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_PAYLOAD" >/dev/null

          export AGENT_INSTRUCTIONS="このIssueに従って週次調査 seed ファイルを作成し、copilot/linestamp-research-${WEEK} ブランチでPRを作成してください。"
          export TARGET_REPO="$GITHUB_REPOSITORY"

          python3 - <<'PY' > /tmp/linestamp-research-assignee.json
          import json
          import os

          print(json.dumps({
              "assignees": ["copilot-swe-agent[bot]"],
              "agent_assignment": {
                  "target_repo": os.environ["TARGET_REPO"],
                  "base_branch": "main",
                  "custom_instructions": os.environ["AGENT_INSTRUCTIONS"],
              },
          }))
          PY

          curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/assignees" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d @/tmp/linestamp-research-assignee.json >/dev/null
