name: PR CI Auto Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pr_ci_fix:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          (startsWith(github.event.workflow_run.head_branch, 'claude/') ||
           startsWith(github.event.workflow_run.head_branch, 'copilot/') ||
           startsWith(github.event.workflow_run.head_branch, 'auto-fix/')) }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_JOBS != '' && secrets.SLACK_WEBHOOK_URL_JOBS || secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Find PR and failed jobs
        id: info
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;
            const runId = context.payload.workflow_run.id;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`
            });
            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.info('No open PR found for this CI run');
              core.setOutput('has_pr', 'false');
              return;
            }

            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100
            });

            const failed = jobsData.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name);
            const lintFailed = failed.includes('lint');
            const otherFailed = failed.filter(n => n !== 'lint');

            core.setOutput('has_pr', 'true');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('head_branch', headBranch);
            core.setOutput('lint_failed', lintFailed ? 'true' : 'false');
            core.setOutput('needs_copilot', otherFailed.length > 0 ? 'true' : 'false');
            core.setOutput('other_failed_jobs', otherFailed.join(', '));

      # lint失敗 → RuboCop自動修正して同じブランチにpush
      - name: Checkout PR branch
        if: steps.info.outputs.has_pr == 'true' && steps.info.outputs.lint_failed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.info.outputs.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        if: steps.info.outputs.has_pr == 'true' && steps.info.outputs.lint_failed == 'true'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: RuboCop autocorrect and push to PR branch
        if: steps.info.outputs.has_pr == 'true' && steps.info.outputs.lint_failed == 'true'
        id: rubocop
        run: |
          bin/rubocop --autocorrect || true
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No auto-fixable violations found"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "auto-fix: RuboCop autocorrect"
            git push origin HEAD:${{ steps.info.outputs.head_branch }}
          fi

      # lint自動修正できない場合もCopilotに依頼
      - name: Assign Copilot if lint not auto-fixable
        if: >-
          ${{ steps.info.outputs.has_pr == 'true' &&
              steps.info.outputs.lint_failed == 'true' &&
              steps.rubocop.outputs.changed == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.info.outputs.pr_number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: ['Copilot']
              });
            } catch (e) {
              core.warning(`Copilot assign failed: ${e.message}`);
            }
             await github.rest.issues.createComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               issue_number: prNumber,
               body: `🤖 lint CI が失敗しましたが、RuboCop では自動修正できませんでした。\n\n@github-copilot このPRで修正コミットを追加してください。\n\n**CIログ**: ${runUrl}`
             });

      # test / route-check 等の失敗 → Copilotをassignしてコメント
      - name: Assign Copilot for non-lint failures
        if: steps.info.outputs.has_pr == 'true' && steps.info.outputs.needs_copilot == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.info.outputs.pr_number }}');
            const failedJobs = '${{ steps.info.outputs.other_failed_jobs }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: ['Copilot']
              });
            } catch (e) {
              core.warning(`Copilot assign failed: ${e.message}`);
            }
             await github.rest.issues.createComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               issue_number: prNumber,
               body: `🤖 CI が失敗しました。\n\n@github-copilot このPRで修正コミットを追加してください。\n\n**失敗したジョブ**: \`${failedJobs}\`\n**CIログ**: ${runUrl}`
             });

      - name: Notify Slack
        if: steps.info.outputs.has_pr == 'true'
        run: |
          LINT="${{ steps.info.outputs.lint_failed }}"
          RUBOCOP_CHANGED="${{ steps.rubocop.outputs.changed }}"
          COPILOT="${{ steps.info.outputs.needs_copilot }}"
          PR="${{ steps.info.outputs.pr_number }}"
          BRANCH="${{ steps.info.outputs.head_branch }}"
          JOBS="${{ steps.info.outputs.other_failed_jobs }}"

          if [ "$LINT" = "true" ] && [ "$RUBOCOP_CHANGED" = "true" ]; then
            TEXT=":wrench: *PR #${PR} lint自動修正済み* \`${BRANCH}\` → CI再実行中"
            COLOR="#f0a500"
          elif [ "$LINT" = "true" ] && [ "$RUBOCOP_CHANGED" = "false" ] && [ "$COPILOT" = "false" ]; then
            TEXT=":robot_face: *PR #${PR} lint失敗（手動修正必要）* \`${BRANCH}\` → Copilot修正依頼済み"
            COLOR="#e01e5a"
          elif [ "$COPILOT" = "true" ]; then
            TEXT=":robot_face: *PR #${PR} CI失敗 → Copilot修正依頼済み* \`${BRANCH}\`"
            COLOR="#e01e5a"
          else
            TEXT=":x: *PR #${PR} CI失敗* \`${BRANCH}\`"
            COLOR="#e01e5a"
          fi

          PAYLOAD=$(jq -n \
            --arg text "$TEXT" \
            --arg color "$COLOR" \
            --arg jobs "${JOBS:-なし}" \
            '{attachments:[{color:$color,text:$text,fields:[{title:"失敗ジョブ（lint以外）",value:$jobs,short:false}],footer:"GitHub Actions PR CI Fix",ts:now|floor}]}')
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
