name: "Copilot Setup Steps"

# セットアップ変更時に自動検証、または手動実行で確認
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # このジョブ名は変更不可（Copilot がこの名前で検出する）
  copilot-setup-steps:
    runs-on: [self-hosted, sakura-vps]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ruby のセットアップ（VPS の rbenv を使用、ci.yml と同じ方式）
      - name: Setup Ruby via rbenv
        run: |
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      # フロントエンド依存のインストール（VPS の Node.js を使用）
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # テスト用DBをあらかじめ準備しておく（VPS の PostgreSQL/Redis を使用）
      - name: Prepare test database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:migrate || bin/rails db:schema:load
          bin/rails db:test:prepare

      # 本番スナップショットをテストDBにロード（db/snapshots/db_snapshot.json が存在する場合）
      - name: Load production snapshot into test DB
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: |
          if [ -f db/snapshots/db_snapshot.json ]; then
            bin/rails db:snapshot_load
          else
            echo "No snapshot found, skipping load (run 'DB Snapshot for Copilot' workflow to create one)"
          fi

      # Zeitwerk（オートロード）確認
      - name: Check autoload integrity
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432
          POSTGRES_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
        run: bin/rails zeitwerk:check
